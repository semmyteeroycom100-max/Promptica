          modalOverlay.classList.remove('active');
          enterPrompter(true); // with coach
        });
      }

      // ===== CALIBRATION =====
      function startCalibration() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          toast('Speech recognition not supported');
          return;
        }
        toast('Calibration: read the sample text aloud');
        // Simple calibration using Web Speech
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.interimResults = false;
        const sample = "The quick brown fox jumps over the lazy dog. This is a sample text to measure your reading pace. Please read it naturally.";
        const words = sample.split(/\s+/).length;
        let startTime = 0;
        rec.onstart = () => { startTime = Date.now(); toast('Listening...'); };
        rec.onresult = (e) => {
          const spoken = e.results[0][0].transcript.trim();
          const elapsed = (Date.now() - startTime) / 1000;
          const spokenWords = spoken.split(/\s+/).length;
          const wpm = Math.round((spokenWords / elapsed) * 60);
          const speed = Math.min(10, Math.max(1, Math.round(wpm / 30)));
          setSpeed(speed);
          toast(`Calibrated! Speed set to ${speed} (${wpm} WPM)`);
          rec.stop();
        };
        rec.onerror = () => toast('Calibration failed, try again');
        rec.start();
      }

      // ===== SPEED =====
      function setSpeed(val) {
        val = Math.min(10, Math.max(1, val));
        state.settings.speed = val;
        settingSpeed.value = val; speedLabel.textContent = val;
        ctrlSpeed.value = val; ctrlSpeedLabel.textContent = val;
        autoSaveScript();
      }

      // ===== PROMPTER: RENDER, SCROLL =====
      function renderPrompterText() {
        const text = scriptText.value || '— No script loaded —';
        const lines = text.split('\n');
        prompterText.innerHTML = lines.map(l => l.trim() ? `<p>${escapeHtml(l)}</p>` : '<p>&nbsp;</p>').join('');
      }

      function applyPrompterStyles() {
        const s = state.settings;
        let bg = s.bgColor;
        if (bg.startsWith('#')) {
          const r=parseInt(bg.slice(1,3),16), g=parseInt(bg.slice(3,5),16), b=parseInt(bg.slice(5,7),16);
          bg = `rgba(${r},${g},${b},${s.bgOpacity})`;
        }
        prompterViewport.style.setProperty('--prompter-bg', bg);
        prompterText.style.color = s.textColor;
        prompterText.style.fontFamily = s.fontFamily;
        prompterText.style.fontSize = s.fontSize + 'px';
        prompterTextWrap.classList.toggle('mirror', s.mirror);
        prompterViewport.classList.toggle('no-focus', !s.focus);
        ctrlMirror.classList.toggle('active', s.mirror);
        ctrlFocus.classList.toggle('active', s.focus);
      }

      function resetScroll() { state.scrollProgress = 0; updateTextPosition(); progressFill.style.width = '0%'; }

      function measureTextHeight() {
        const wrap = prompterTextWrap;
        const cur = wrap.style.transform;
        wrap.style.transform = 'none';
        state.textHeight = prompterText.scrollHeight;
        const vp = prompterViewport.getBoundingClientRect();
        state.viewportHeight = vp.height;
        state.maxScrollPx = Math.max(0, state.textHeight - state.viewportHeight);
        wrap.style.transform = cur || 'translateY(0px)';
        if (state.maxScrollPx <= 0) { state.isPlaying = false; updatePlayIcon(); }
      }

      function updateTextPosition() {
        const wrap = prompterTextWrap;
        const progress = state.scrollProgress;
        const total = state.viewportHeight + state.textHeight;
        let y = state.viewportHeight - progress * total;
        y = Math.max(-state.textHeight, Math.min(state.viewportHeight, y));
        const mirror = state.settings.mirror;
        wrap.style.transform = mirror ? `scaleX(-1) translateY(${y}px)` : `translateY(${y}px)`;
        progressFill.style.width = Math.min(100, progress * 100) + '%';
      }

      function animateScroll(ts) {
        if (!prompterPage.classList.contains('active')) return;
        const delta = state.lastTimestamp ? (ts - state.lastTimestamp) / 1000 : 0;
        state.lastTimestamp = ts;
        if (state.isPlaying && state.maxScrollPx > 0) {
          const spd = state.settings.speed / 10;
          const pxPerSec = 300 * spd * 1.6;
          const total = state.viewportHeight + state.textHeight;
          const dP = (pxPerSec * delta) / total;
          state.scrollProgress = Math.min(1, state.scrollProgress + dP);
          updateTextPosition();
          if (state.scrollProgress >= 1) { state.isPlaying = false; updatePlayIcon(); }
        }
        state.animFrameId = requestAnimationFrame(animateScroll);
      }

      function startAnimation() { if (state.animFrameId) cancelAnimationFrame(state.animFrameId); state.lastTimestamp = 0; state.animFrameId = requestAnimationFrame(animateScroll); }
      function stopAnimation() { if (state.animFrameId) { cancelAnimationFrame(state.animFrameId); state.animFrameId = null; } }

      function togglePlay() {
        if (state.maxScrollPx <= 0) { state.isPlaying = false; updatePlayIcon(); return; }
        if (state.scrollProgress >= 1) { state.scrollProgress = 0; updateTextPosition(); progressFill.style.width = '0%'; }
        state.isPlaying = !state.isPlaying;
        updatePlayIcon();
      }
      function updatePlayIcon() { ctrlPlayIcon.textContent = state.isPlaying ? '⏸' : '▶'; }

      // ===== CAMERA =====
      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: true });
          state.cameraStream = stream;
          camBgVideo.srcObject = stream;
          camCompactVideo.srcObject = stream;
          await camBgVideo.play();
          await camCompactVideo.play();
          return stream;
        } catch(e) { toast('Camera error: '+e.message); return null; }
      }

      function toggleCameraMode() {
        if (state.camMode === 'full') {
          state.camMode = 'compact';
          camBg.style.display = 'none';
          camCompact.style.display = 'block';
          camToggle.textContent = '📷 Full';
          // restore position
          camCompact.style.left = state.camCompactPos.x + 'px';
          camCompact.style.top = state.camCompactPos.y + 'px';
          camCompact.style.width = state.camCompactPos.w + 'px';
          camCompact.style.height = state.camCompactPos.h + 'px';
        } else {
          state.camMode = 'full';
          camCompact.style.display = 'none';
          camBg.style.display = 'block';
          camToggle.textContent = '📷 Compact';
        }
        localStorage.setItem('prompter_cam_mode', state.camMode);
      }

      // ===== DRAGGABLE COMPACT CAMERA =====
      let dragData = null;
      function initDraggable() {
        const el = camCompact;
        el.addEventListener('pointerdown', (e) => {
          if (e.target === resizeHandle) return;
          const rect = el.getBoundingClientRect();
          dragData = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
          el.style.cursor = 'grabbing';
          document.addEventListener('pointermove', onDrag);
          document.addEventListener('pointerup', stopDrag);
          e.preventDefault();
        });
        resizeHandle.addEventListener('pointerdown', (e) => {
          dragData = { resize: true, startX: e.clientX, startY: e.clientY, startW: el.offsetWidth, startH: el.offsetHeight };
          document.addEventListener('pointermove', onResize);
          document.addEventListener('pointerup', stopResize);
          e.preventDefault();
        });
      }
      function onDrag(e) {
        if (!dragData) return;
        const rect = prompterViewport.getBoundingClientRect();
        let x = e.clientX - rect.left - dragData.offsetX;
        let y = e.clientY - rect.top - dragData.offsetY;
        x = Math.max(0, Math.min(rect.width - camCompact.offsetWidth, x));
        y = Math.max(0, Math.min(rect.height - camCompact.offsetHeight, y));
        camCompact.style.left = x + 'px';
        camCompact.style.top = y + 'px';
        state.camCompactPos.x = x; state.camCompactPos.y = y;
      }
      function stopDrag() { document.removeEventListener('pointermove', onDrag); document.removeEventListener('pointerup', stopDrag); if(camCompact) camCompact.style.cursor = 'grab'; dragData = null; }
      function onResize(e) {
        if (!dragData) return;
        let w = dragData.startW + (e.clientX - dragData.startX);
        let h = dragData.startH + (e.clientY - dragData.startY);
        w = Math.max(80, Math.min(400, w));
        h = Math.max(60, Math.min(300, h));
        camCompact.style.width = w + 'px';
        camCompact.style.height = h + 'px';
        state.camCompactPos.w = w; state.camCompactPos.h = h;
      }
      function stopResize() { document.removeEventListener('pointermove', onResize); document.removeEventListener('pointerup', stopResize); dragData = null; }

      // ===== RECORDING (Raw Video+Audio) =====
      function startRawRecording() {
        if (state.isRecording) return;
        if (!state.cameraStream) { toast('Camera not ready'); return; }
        // Create a new stream with video+audio tracks
        const stream = new MediaStream();
        const videoTracks = state.cameraStream.getVideoTracks();
        const audioTracks = state.cameraStream.getAudioTracks();
        if (videoTracks.length) stream.addTrack(videoTracks[0].clone());
        if (audioTracks.length) stream.addTrack(audioTracks[0].clone());
        state.rawRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        state.rawChunks = [];
        state.rawRecorder.ondataavailable = (e) => { if (e.data.size) state.rawChunks.push(e.data); };
        state.rawRecorder.onstop = () => {
          const blob = new Blob(state.rawChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `promptica_recording_${Date.now()}.webm`;
          a.click();
          URL.revokeObjectURL(url);
          state.rawChunks = [];
          state.isRecording = false;
          recordingDot.classList.remove('recording');
          clearInterval(state.recordTimerInterval);
          recordTimer.textContent = '00:00';
          toast('Recording saved (raw video+audio)');
          // Save session
          const duration = (Date.now() - state.recordStartTime) / 1000;
          saveSession({ timestamp: Date.now(), duration, confidence: state.confidence, filler: state.fillerCount });
          updateStreak('record');
        };
        state.isRecording = true;
        recordingDot.classList.add('recording');
        state.recordStartTime = Date.now();
        state.recordTimerInterval = setInterval(() => {
          const el = (Date.now() - state.recordStartTime) / 1000;
          recordTimer.textContent = formatTime(el);
        }, 200);
        state.rawRecorder.start(1000);
        toast('Recording started (raw video+audio)');
      }

      function stopRawRecording() {
        if (state.rawRecorder && state.isRecording) {
          state.rawRecorder.stop();
          state.isRecording = false;
          recordingDot.classList.remove('recording');
          clearInterval(state.recordTimerInterval);
        }
      }
      function toggleRecording() {
        state.isRecording ? stopRawRecording() : startRawRecording();
      }

      // ===== STREAK =====
      function updateStreak(type) {
        const today = new Date().toISOString().split('T')[0];
        if (type === 'practice') {
          if (state.streakData.lastPracticeDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().split('T')[0];
            if (state.streakData.lastPracticeDate === yStr) {
              state.streakData.currentStreak++;
            } else {
              state.streakData.currentStreak = 1;
            }
            state.streakData.lastPracticeDate = today;
            if (state.streakData.currentStreak > state.streakData.longestStreak) state.streakData.longestStreak = state.streakData.currentStreak;
          }
        } else if (type === 'record') {
          if (state.streakData.lastRecordingDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().split('T')[0];
            if (state.streakData.lastRecordingDate === yStr) {
              state.streakData.recordingStreak++;
            } else {
              state.streakData.recordingStreak = 1;
            }
            state.streakData.lastRecordingDate = today;
            if (state.streakData.recordingStreak > state.streakData.longestRecordingStreak) state.streakData.longestRecordingStreak = state.streakData.recordingStreak;
          }
        }
        state.streakData.totalSessions++;
        localStorage.setItem('promptica_streak', JSON.stringify(state.streakData));
        updateStreakBadge();
      }

      function updateStreakBadge() {
        const s = state.streakData;
        streakBadge.textContent = `🔥 ${s.currentStreak}-day`;
      }

      // ===== COACH (live feedback) =====
      let coachInterval = null;
      let fillerDetection = null;
      let speechRec = null;

      function startCoach() {
        state.coachActive = true;
        coachIndicators.style.display = 'block';
        // Start filler detection using Web Speech
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
          speechRec = new SpeechRec();
          speechRec.lang = 'en-US';
          speechRec.interimResults = true;
          speechRec.continuous = true;
          speechRec.onresult = (e) => {
            for (const res of e.results) {
              const transcript = res[0].transcript.toLowerCase();
              const fillers = ['um','uh','like','you know','actually','basically'];
              const words = transcript.split(/\s+/);
              for (const w of words) {
                if (fillers.includes(w)) state.fillerCount++;
              }
              fillerCount.textContent = state.fillerCount;
            }
          };
          speechRec.start();
        }
        // Confidence & speed monitoring using VAD + pitch
        if (!state.analyser) initVAD();
        // Start interval to update confidence
        if (coachInterval) clearInterval(coachInterval);
        coachInterval = setInterval(() => {
          if (!state.coachActive) return;
          // Update speed light based on current speed vs calibrated
          const spd = state.settings.speed;
          if (spd > 7) { speedLight.className = 'light fast'; speedLabelCoach.textContent = 'Fast'; }
          else if (spd < 3) { speedLight.className = 'light slow'; speedLabelCoach.textContent = 'Slow'; }
          else { speedLight.className = 'light'; speedLabelCoach.textContent = 'Pace'; }
          // Confidence score: combine speed deviation, filler count, and pitch variance
          const fillerPenalty = Math.min(20, state.fillerCount * 2);
          const speedDev = Math.abs(spd - 5) * 2;
          let conf = 100 - fillerPenalty - speedDev;
          conf = Math.max(0, Math.min(100, conf));
          state.confidence = conf;
          confidenceScore.textContent = `Confidence: ${conf}%`;
          // Breath circle: show during pauses (VAD)
          if (state.vadSpeaking) {
            breathCircle.style.display = 'none';
          } else {
            breathCircle.style.display = 'block';
          }
        }, 1000);
      }

      function stopCoach() {
        state.coachActive = false;
        coachIndicators.style.display = 'none';
        if (speechRec) { speechRec.stop(); speechRec = null; }
        if (coachInterval) { clearInterval(coachInterval); coachInterval = null; }
        state.fillerCount = 0;
        fillerCount.textContent = '0';
      }

      // ===== VAD (reuse from earlier) =====
      let vadInitialized = false;
      async function initVAD() {
        if (vadInitialized) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          state.audioContext = audioCtx;
          state.analyser = analyser;
          vadInitialized = true;
          monitorVAD();
        } catch(e) { toast('Microphone error: '+e.message); }
      }
      function monitorVAD() {
        if (!state.analyser) return;
        const data = new Uint8Array(state.analyser.fftSize);
        state.analyser.getByteFrequencyData(data);
        let sum = 0; for (let i=0; i<data.length; i++) sum += data[i];
        const avg = sum / data.length / 255;
        if (avg > state.vadThreshold && !state.vadSpeaking) {
          state.vadSpeaking = true;
          if (!state.isPlaying && state.maxScrollPx > 0) {
            if (state.scrollProgress >= 1) { state.scrollProgress = 0; updateTextPosition(); progressFill.style.width = '0%'; }
            state.isPlaying = true;
            updatePlayIcon();
          }
        } else if (avg < state.vadThreshold && state.vadSpeaking) {
          state.vadSpeaking = false;
          clearTimeout(state.vadHoldTimer);
          state.vadHoldTimer = setTimeout(() => {
            if (!state.vadSpeaking) { state.isPlaying = false; updatePlayIcon(); }
          }, 300);
        }
        if (state.vadEnabled) requestAnimationFrame(monitorVAD);
      }

      // ===== ENTER / EXIT PROMPTER =====
      async function enterPrompter(withCoach = false) {
        await saveCurrentScript();
        renderPrompterText();
        showPage('prompter-page');
        applyPrompterStyles();
        if (!state.cameraStream) await initCamera();
        // Camera mode
        const savedMode = localStorage.getItem('prompter_cam_mode') || 'full';
        state.camMode = savedMode;
        if (savedMode === 'full') { camBg.style.display = 'block'; camCompact.style.display = 'none'; camToggle.textContent = '📷 Compact'; }
        else { camBg.style.display = 'none'; camCompact.style.display = 'block'; camToggle.textContent = '📷 Full'; }
        // Position
        camCompact.style.left = state.camCompactPos.x + 'px';
        camCompact.style.top = state.camCompactPos.y + 'px';
        camCompact.style.width = state.camCompactPos.w + 'px';
        camCompact.style.height = state.camCompactPos.h + 'px';

        if (withCoach) { startCoach(); }
        updateStreak('practice');

        requestAnimationFrame(() => {
          setTimeout(() => {
            measureTextHeight();
            resetScroll();
            if (state.maxScrollPx > 0) { state.isPlaying = true; updatePlayIcon(); } else { state.isPlaying = false; updatePlayIcon(); }
            startAnimation();
            showControlsTemporarily();
            if (prompterPage.requestFullscreen) prompterPage.requestFullscreen().catch(() => {});
          }, 50);
        });
      }

      function exitPrompter() {
        stopRawRecording();
        stopCoach();
        state.isPlaying = false;
        stopAnimation();
        if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
        prompterPage.classList.remove('active');
        showPage('editor-page');
      }

      // ===== CONTROLS AUTO-HIDE =====
      let controlsTimeout = null;
      function showControlsTemporarily() {
        prompterControls.classList.add('visible');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => prompterControls.classList.remove('visible'), 3500);
      }

      // ===== KEYBOARD SHORTCUTS =====
      document.addEventListener('keydown', (e) => {
        if (prompterPage.classList.contains('active')) {
          if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); togglePlay(); showControlsTemporarily(); return; }
          if (e.key === 'Escape') { e.preventDefault(); exitPrompter(); return; }
          if (e.key === 'ArrowUp') { e.preventDefault(); setSpeed(Math.min(10, state.settings.speed + 0.5)); showControlsTemporarily(); return; }
          if (e.key === 'ArrowDown') { e.preventDefault(); setSpeed(Math.max(1, state.settings.speed - 0.5)); showControlsTemporarily(); return; }
          if (e.key === 'm' || e.key === 'M') { e.preventDefault(); toggleMirrorMode(); showControlsTemporarily(); return; }
          if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFocusMode(); showControlsTemporarily(); return; }
          if (e.key === 'r' || e.key === 'R') { e.preventDefault(); toggleRecording(); showControlsTemporarily(); return; }
          if (e.key === 'c' || e.key === 'C') { e.preventDefault(); toggleCoach(); showControlsTemporarily(); return; }
        }
        if (editorPage.classList.contains('active') && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault(); enterPrompter();
        }
      });

      // ===== TOGGLES =====
      function toggleMirrorMode() { state.settings.mirror = !state.settings.mirror; toggleMirror.classList.toggle('active', state.settings.mirror); if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); }
      function toggleFocusMode() { state.settings.focus = !state.settings.focus; toggleFocus.classList.toggle('active', state.settings.focus); if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); }
      function toggleCoach() {
        if (prompterPage.classList.contains('active')) {
          if (state.coachActive) stopCoach(); else startCoach();
        } else {
          toast('Enter prompter first');
        }
      }

      // ===== ADMIN =====
      btnAdmin.addEventListener('click', () => {
        const pwd = prompt('Enter admin password:');
        if (pwd === state.adminPassword) {
          state.isAdmin = true;
          showAdminPanel();
        } else {
          toast('Wrong password');
        }
      });

      function showAdminPanel() {
        showModal('⚙️ Admin Panel', `
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div><h3>📝 Manage Articles</h3>
              <button class="btn" id="admin-new-article">+ New Article</button>
              <div id="admin-article-list"></div>
            </div>
            <div><h3>🎤 SpeakEasy Categories</h3>
              <button class="btn" id="admin-new-category">+ New Category</button>
              <div id="admin-category-list"></div>
            </div>
            <div><h3>💾 GitHub Sync</h3>
              <button class="btn btn-primary" id="admin-sync-github">Sync to GitHub</button>
              <button class="btn" id="admin-export-content">Export JSON</button>
              <button class="btn" id="admin-import-content">Import JSON</button>
            </div>
          </div>
        `);
        loadAdminContent();
        // Bind buttons
        document.getElementById('admin-new-article')?.addEventListener('click', () => newArticle());
        document.getElementById('admin-new-category')?.addEventListener('click', () => newCategory());
        document.getElementById('admin-sync-github')?.addEventListener('click', syncToGitHub);
        document.getElementById('admin-export-content')?.addEventListener('click', exportContent);
        document.getElementById('admin-import-content')?.addEventListener('click', importContent);
      }

      async function loadAdminContent() {
        const content = await getContent();
        state.content = content;
        // Articles
        const list = document.getElementById('admin-article-list');
        if (list) list.innerHTML = content.articles.map((a, i) => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-color);">
            <span>${a.title}</span>
            <div>
              <button class="btn" style="font-size:11px;padding:2px 8px;" onclick="editArticle(${i})">✏️</button>
              <button class="btn" style="font-size:11px;padding:2px 8px;color:#ef4444;" onclick="deleteArticle(${i})">🗑</button>
            </div>
          </div>
        `).join('');
        // Categories
        const catList = document.getElementById('admin-category-list');
        if (catList) catList.innerHTML = content.speakEasy.map((c, i) => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-color);">
            <span>${c.icon || '🎤'} ${c.name}</span>
            <div>
              <button class="btn" style="font-size:11px;padding:2px 8px;" onclick="editCategory(${i})">✏️</button>
              <button class="btn" style="font-size:11px;padding:2px 8px;color:#ef4444;" onclick="deleteCategory(${i})">🗑</button>
            </div>
          </div>
        `).join('');
      }

      window.editArticle = function(i) {
        const a = state.content.articles[i];
        const title = prompt('Article title:', a.title);
        if (title === null) return;
        const content = prompt('Content (Markdown):', a.content);
        if (content === null) return;
        state.content.articles[i] = { ...a, title, content };
        saveContent(state.content);
        loadAdminContent();
        toast('Article updated');
      };
      window.deleteArticle = function(i) {
        if (!confirm('Delete this article?')) return;
        state.content.articles.splice(i, 1);
        saveContent(state.content);
        loadAdminContent();
        toast('Article deleted');
      };
      window.editCategory = function(i) {
        const c = state.content.speakEasy[i];
        const name = prompt('Category name:', c.name);
        if (name === null) return;
        const desc = prompt('Description:', c.description || '');
        if (desc === null) return;
        state.content.speakEasy[i] = { ...c, name, description: desc };
        saveContent(state.content);
        loadAdminContent();
        toast('Category updated');
      };
      window.deleteCategory = function(i) {
        if (!confirm('Delete this category?')) return;
        state.content.speakEasy.splice(i, 1);
        saveContent(state.content);
        loadAdminContent();
        toast('Category deleted');
      };

      async function newArticle() {
        const title = prompt('Article title:');
        if (!title) return;
        const content = prompt('Content (Markdown):');
        if (content === null) return;
        state.content.articles.push({ id: 'art-'+Date.now(), title, content, publishedAt: new Date().toISOString() });
        await saveContent(state.content);
        loadAdminContent();
        toast('Article created');
      }
      async function newCategory() {
        const name = prompt('Category name:');
        if (!name) return;
        const desc = prompt('Description (optional):');
        state.content.speakEasy.push({ name, description: desc || '', icon: '🎤', articles: [] });
        await saveContent(state.content);
        loadAdminContent();
        toast('Category created');
      }

      async function exportContent() {
        const c = await getContent();
        const blob = new Blob([JSON.stringify(c, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `promptica_content_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('Exported');
      }
      function importContent() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const text = await file.text();
          const data = JSON.parse(text);
          await saveContent(data);
          state.content = data;
          toast('Content imported');
          loadAdminContent();
        };
        input.click();
      }

      // ===== GITHUB SYNC =====
      async function syncToGitHub() {
        if (!state.isAdmin) { toast('Admin access required'); return; }
        const token = prompt('Enter GitHub Personal Access Token (classic, repo scope):');
        if (!token) return;
        const repo = prompt('Enter repo in format "username/repo":');
        if (!repo) return;
        state.githubToken = token;
        state.repo = repo;
        try {
          const content = await getContent();
          const payload = {
            message: 'Update content from Promptica',
            content: btoa(JSON.stringify(content, null, 2)),
            branch: 'main'
          };
          // Check if file exists
          const exists = await fetch(`https://api.github.com/repos/${repo}/contents/content.json`, {
            headers: { Authorization: `token ${token}` }
          });
          let sha = null;
          if (exists.ok) {
            const data = await exists.json();
            sha = data.sha;
          }
          const url = `https://api.github.com/repos/${repo}/contents/content.json`;
          const res = await fetch(url, {
            method: 'PUT',
            headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...payload, sha })
          });
          if (res.ok) {
            toast('Synced to GitHub! Vercel will redeploy.');
          } else {
            const err = await res.json();
            toast('GitHub error: ' + err.message);
          }
        } catch(e) {
          toast('Sync failed: ' + e.message);
        }
      }

      // ===== EVENT BINDINGS =====
      // Editor
      editorBack.addEventListener('click', async () => { await saveCurrentScript(); showPage('home-page'); renderHome(); });
      scriptTitle.addEventListener('input', autoSaveScript);
      scriptText.addEventListener('input', autoSaveScript);
      btnSave.addEventListener('click', saveCurrentScript);
      btnEnter.addEventListener('click', () => enterPrompter(false));

      // Settings
      settingSpeed.addEventListener('input', () => { setSpeed(parseFloat(settingSpeed.value)); autoSaveScript(); });
      settingFont.addEventListener('change', () => { state.settings.fontFamily = settingFont.value; if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); });
      settingSize.addEventListener('change', () => { state.settings.fontSize = parseInt(settingSize.value); if (prompterPage.classList.contains('active')) { applyPrompterStyles(); requestAnimationFrame(() => { setTimeout(() => { measureTextHeight(); updateTextPosition(); }, 30); }); } autoSaveScript(); });
      settingTextColor.addEventListener('input', () => { state.settings.textColor = settingTextColor.value; if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); });
      settingBgColor.addEventListener('input', () => { state.settings.bgColor = settingBgColor.value; if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); });
      settingBgOpacity.addEventListener('input', () => { const v = parseFloat(settingBgOpacity.value); state.settings.bgOpacity = v; opacityLabel.textContent = v.toFixed(2); if (prompterPage.classList.contains('active')) applyPrompterStyles(); autoSaveScript(); });
      toggleMirror.addEventListener('click', toggleMirrorMode);
      toggleFocus.addEventListener('click', toggleFocusMode);
      toggleVad.addEventListener('click', () => { state.settings.vad = !state.settings.vad; toggleVad.classList.toggle('active', state.settings.vad); state.vadEnabled = state.settings.vad; if (state.vadEnabled) { if (!vadInitialized) initVAD(); else monitorVAD(); } else { state.vadSpeaking = false; clearTimeout(state.vadHoldTimer); state.isPlaying = false; updatePlayIcon(); } autoSaveScript(); });
      btnCalibrate.addEventListener('click', startCalibration);
      btnSummarize.addEventListener('click', () => toast('Summarization coming soon'));

      // Prompter controls
      ctrlPlay.addEventListener('click', () => { togglePlay(); showControlsTemporarily(); });
      ctrlSpeed.addEventListener('input', () => { setSpeed(parseFloat(ctrlSpeed.value)); showControlsTemporarily(); });
      ctrlMirror.addEventListener('click', () => { toggleMirrorMode(); showControlsTemporarily(); });
      ctrlFocus.addEventListener('click', () => { toggleFocusMode(); showControlsTemporarily(); });
      ctrlRecord.addEventListener('click', () => { toggleRecording(); showControlsTemporarily(); });
      ctrlCoach.addEventListener('click', () => { toggleCoach(); showControlsTemporarily(); });
      ctrlExit.addEventListener('click', exitPrompter);
      prompterBack.addEventListener('click', exitPrompter);

      // Camera toggles
      camToggle.addEventListener('click', toggleCameraMode);
      initDraggable();

      // Mouse/touch to show controls
      prompterPage.addEventListener('mousemove', () => { if (prompterPage.classList.contains('active')) showControlsTemporarily(); });
      prompterPage.addEventListener('touchstart', () => { if (prompterPage.classList.contains('active')) showControlsTemporarily(); });
      window.addEventListener('resize', () => { if (prompterPage.classList.contains('active')) { requestAnimationFrame(() => { setTimeout(() => { measureTextHeight(); updateTextPosition(); }, 50); }); } });
      document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement && prompterPage.classList.contains('active')) showControlsTemporarily(); });

      // ===== INIT =====
      async function init() {
        await openDB();
        // Load settings
        try {
          const saved = localStorage.getItem('prompter_global_settings');
          if (saved) { const p = JSON.parse(saved); Object.assign(state.settings, p); applySettingsToUI(state.settings); }
        } catch(_) {}
        // Load streak
        try {
          const s = localStorage.getItem('prompter_streak');
          if (s) { state.streakData = JSON.parse(s); }
        } catch(_) {}
        // Load cam mode
        const mode = localStorage.getItem('prompter_cam_mode');
        if (mode) state.camMode = mode;
        // Load theme
        try {
          const t = localStorage.getItem('promptica_theme');
          if (t) { const p = JSON.parse(t); document.documentElement.style.setProperty('--bg-primary', p.bg); document.documentElement.style.setProperty('--text-primary', p.text); }
        } catch(_) {}

        renderHome();
        // Preload camera and VAD
        initCamera();
        initVAD();
        // Auto-save settings
        document.addEventListener('change', readSettingsFromUI);
        toast('🎙️ Promptica ready');
        // Expose
        window.__prompter = { state, enterPrompter, exitPrompter, togglePlay, setSpeed, toggleRecording, toggleCoach, startCalibration };
      }

      init();
    })();
  </script>
</body>
</html>
