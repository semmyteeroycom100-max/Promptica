<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Promptica · Studio Prompter</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0b0b0b; --bg-secondary: #161616; --bg-panel: #1e1e1e;
      --bg-card: #1a1a1a; --border-color: #2c2c2c;
      --text-primary: #f0ece6; --text-secondary: #a8a29e;
      --accent: #8b7a6b; --accent-hover: #a89484;
      --shadow: 0 20px 60px rgba(0,0,0,0.8); --radius: 12px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --transition: 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; max-height: 100vh; overflow: hidden; background: var(--bg-primary); }
    .page { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; padding: 0; }
    .page.active { display: flex; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ===== HOME PAGE ===== */
    #home-page { background: var(--bg-primary); padding: 24px 28px 28px 28px; overflow-y: auto; display: none; flex-direction: column; }
    #home-page.active { display: flex; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-shrink: 0; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
    .home-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; color: var(--text-primary); display: flex; align-items: center; gap: 12px; }
    .home-header h1 span { font-size: 14px; background: var(--accent); color: #0b0b0b; padding: 2px 12px; border-radius: 40px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
    .home-header .status-badge { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); }
    .home-header .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; }

    .home-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; flex-shrink: 0; }
    .home-actions .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .home-actions .btn:hover { background: var(--bg-panel); border-color: var(--accent); }
    .home-actions .btn-primary { background: var(--accent); border-color: var(--accent); color: #0b0b0b; }
    .home-actions .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* Homepage cards grid */
    .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; flex: 1; overflow-y: auto; padding-bottom: 20px; }
    .home-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 18px 16px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
    .home-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .home-card .icon { font-size: 28px; }
    .home-card .title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .home-card .desc { font-size: 12px; color: var(--text-secondary); opacity: 0.7; line-height: 1.4; }
    .home-card .badge { background: var(--accent); color: #0b0b0b; font-size: 10px; font-weight: 600; padding: 2px 10px; border-radius: 20px; align-self: flex-start; margin-top: 4px; }

    /* ===== EDITOR PAGE (simplified) ===== */
    #editor-page { background: var(--bg-primary); padding: 0; display: none; flex-direction: column; height: 100%; overflow: hidden; }
    #editor-page.active { display: flex; }
    .editor-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .editor-topbar .back-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; }
    .editor-topbar .back-btn:hover { background: var(--bg-panel); }
    .editor-topbar .script-title-input { background: transparent; border: none; color: var(--text-primary); font-size: 18px; font-weight: 500; font-family: var(--font-sans); padding: 4px 10px; border-radius: 4px; flex: 1; margin: 0 12px; outline: none; min-width: 0; }
    .editor-topbar .script-title-input:focus { background: var(--bg-panel); }
    .editor-topbar .editor-actions { display: flex; gap: 8px; align-items: center; }
    .editor-topbar .editor-actions .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-primary); font-family: var(--font-sans); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .editor-topbar .editor-actions .btn-primary { background: var(--accent); border-color: var(--accent); color: #0b0b0b; }
    .editor-topbar .editor-actions .btn-primary:hover { background: var(--accent-hover); }
    .editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px 20px 0 20px; }
    .editor-textarea-wrapper { flex: 1; position: relative; min-height: 0; }
    .editor-textarea-wrapper textarea { width: 100%; height: 100%; padding: 16px 18px; background: #111; color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius); font-family: var(--font-sans); font-size: 16px; line-height: 1.8; resize: none; outline: none; transition: border-color 0.2s; }
    .editor-textarea-wrapper textarea:focus { border-color: var(--accent); }
    .editor-toolbar { flex-shrink: 0; background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 10px 20px 14px 20px; margin: 0 -20px 0 -20px; padding-left: 20px; padding-right: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px 16px; max-height: 180px; overflow-y: auto; }
    .editor-toolbar .setting { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
    .editor-toolbar .setting label { font-weight: 400; white-space: nowrap; }
    .editor-toolbar .setting select, .editor-toolbar .setting input[type="range"] { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 8px; font-family: var(--font-sans); font-size: 13px; outline: none; cursor: pointer; }
    .editor-toolbar .setting select { min-width: 80px; }
    .editor-toolbar .setting input[type="range"] { width: 70px; padding: 0; background: transparent; accent-color: var(--accent); border: none; }
    .editor-toolbar .setting input[type="color"] { width: 28px; height: 28px; padding: 2px; border: 1px solid var(--border-color); border-radius: 4px; background: none; cursor: pointer; }
    .editor-toolbar .toggle-group { display: flex; align-items: center; gap: 6px; }
    .editor-toolbar .toggle { position: relative; width: 34px; height: 18px; background: var(--bg-input); border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.25s; flex-shrink: 0; }
    .editor-toolbar .toggle.active { background: var(--accent); border-color: var(--accent); }
    .editor-toolbar .toggle .knob { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: transform 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .editor-toolbar .toggle.active .knob { transform: translateX(16px); }
    .editor-toolbar .toggle-label { font-size: 12px; color: var(--text-secondary); user-select: none; }
    .editor-toolbar .separator { width: 1px; height: 24px; background: var(--border-color); flex-shrink: 0; }

    /* ===== PROMPTER PAGE ===== */
    #prompter-page { position: fixed; inset: 0; z-index: 2000; background: var(--bg-primary); display: none; flex-direction: column; overflow: hidden; }
    #prompter-page.active { display: flex; }
    .prompter-viewport { flex: 1; position: relative; overflow: hidden; background: var(--prompter-bg, #0b0b0b); display: flex; align-items: center; justify-content: center; min-height: 0; }
    .prompter-viewport::before, .prompter-viewport::after { content: ''; position: absolute; left: 0; right: 0; z-index: 10; pointer-events: none; height: 18%; transition: opacity 0.4s ease; }
    .prompter-viewport::before { top: 0; background: linear-gradient(to bottom, var(--prompter-bg, #0b0b0b), transparent); }
    .prompter-viewport::after { bottom: 0; background: linear-gradient(to top, var(--prompter-bg, #0b0b0b), transparent); }
    .prompter-viewport.no-focus::before, .prompter-viewport.no-focus::after { opacity: 0; }

    /* Text container */
    .prompter-text-wrap { position: relative; width: 100%; max-width: 820px; padding: 0 40px; margin: 0 auto; will-change: transform; transform: translateY(0px); transition: none; }
    .prompter-text-wrap.mirror { transform: scaleX(-1) translateY(0px) !important; }
    .prompter-text { font-family: var(--prompter-font, 'Inter'); font-size: var(--prompter-size, 34px); font-weight: 400; line-height: 1.6; color: var(--prompter-color, #f5efe8); letter-spacing: 0.3px; word-break: break-word; text-shadow: 0 1px 4px rgba(0,0,0,0.15); padding: 4px 0; user-select: none; }
    .prompter-text p { margin-bottom: 0.4em; }
    .prompter-text p:last-child { margin-bottom: 0; }

    .prompter-progress { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 20; pointer-events: none; }
    .prompter-progress .fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.15s linear; }

    /* Camera: full-screen blur OR compact draggable */
    .cam-bg { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
    .cam-bg video { width: 100%; height: 100%; object-fit: cover; filter: blur(var(--blur, 24px)); transform: scale(1.05); }
    .cam-bg .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
    .cam-compact { position: absolute; z-index: 25; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.15); background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); cursor: grab; touch-action: none; width: 180px; height: 120px; top: 20px; right: 20px; display: none; }
    .cam-compact video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .cam-compact .resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; background: rgba(255,255,255,0.2); border-radius: 0 0 12px 0; }
    .cam-toggle { position: absolute; z-index: 26; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 30px; padding: 4px 12px; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px); }
    .cam-toggle:hover { background: rgba(255,255,255,0.1); }

    /* Floating controls */
    .prompter-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(10,10,10,0.75); backdrop-filter: blur(18px); border-radius: 60px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 12px 40px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.4s ease, transform 0.3s ease; pointer-events: none; transform: translateX(-50%) translateY(10px); font-size: 14px; color: var(--text-primary); white-space: nowrap; }
    .prompter-controls.visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .prompter-controls .ctrl-btn { background: none; border: none; color: var(--text-primary); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; opacity: 0.7; font-family: var(--font-sans); }
    .prompter-controls .ctrl-btn:hover { opacity: 1; background: rgba(255,255,255,0.06); }
    .prompter-controls .ctrl-btn.active { opacity: 1; color: var(--accent); }
    .prompter-controls .ctrl-separator { width: 1px; height: 24px; background: rgba(255,255,255,0.08); }
    .prompter-controls .speed-group { display: flex; align-items: center; gap: 6px; }
    .prompter-controls .speed-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); opacity: 0.6; }
    .prompter-controls .speed-group input[type="range"] { width: 60px; accent-color: var(--accent); background: transparent; cursor: pointer; height: 3px; -webkit-appearance: none; appearance: none; }
    .prompter-controls .speed-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
    .prompter-controls .speed-group input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
    .prompter-controls .speed-value { min-width: 22px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text-primary); opacity: 0.8; }

    /* ===== COACH OVERLAYS (live feedback) ===== */
    .coach-indicators { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
    .coach-speed { position: absolute; top: 16px; left: 16px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 12px; }
    .coach-speed .light { width: 12px; height: 12px; border-radius: 50%; transition: background 0.3s; background: #4caf50; }
    .coach-speed .light.slow { background: #f44336; }
    .coach-speed .light.fast { background: #ff9800; }
    .coach-filler { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 12px; }
    .coach-filler span { color: #ff6b6b; font-weight: 600; }
    .coach-confidence { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 4px 16px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 14px; font-weight: 500; }
    .coach-breath { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); animation: breath 4s ease-in-out infinite; display: none; }
    @keyframes breath { 0%,100% { transform: translateX(-50%) scale(0.8); opacity: 0.3; } 50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; } }

    /* Back button in prompter */
    .prompter-back { position: absolute; top: 16px; left: 16px; z-index: 35; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 30px; padding: 6px 14px; font-size: 14px; cursor: pointer; backdrop-filter: blur(4px); transition: background 0.2s; }
    .prompter-back:hover { background: rgba(255,255,255,0.1); }

    /* ===== MODALS & OVERLAYS ===== */
    .modal-overlay { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 20px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px 32px; box-shadow: var(--shadow); }
    .modal-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
    .modal-box .close-btn { float: right; background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
    .modal-box .btn { padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .modal-box .btn-primary { background: var(--accent); border-color: var(--accent); color: #0b0b0b; }
    .modal-box .btn-primary:hover { background: var(--accent-hover); }

    /* ===== TOAST ===== */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); color: var(--text-primary); padding: 12px 24px; border-radius: 40px; border: 1px solid var(--border-color); box-shadow: var(--shadow); z-index: 9999; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; backdrop-filter: blur(12px); }
    .toast.show { opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .home-header h1 { font-size: 22px; }
      .home-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .editor-topbar { flex-wrap: wrap; gap: 6px; }
      .editor-topbar .script-title-input { order: 2; flex-basis: 100%; margin: 0; }
      .editor-topbar .editor-actions { order: 3; width: 100%; justify-content: flex-end; }
      .editor-body { padding: 8px 12px 0 12px; }
      .editor-toolbar { padding: 8px 12px 12px 12px; margin: 0 -12px 0 -12px; padding-left: 12px; padding-right: 12px; gap: 6px 12px; max-height: 140px; }
      .cam-compact { width: 120px; height: 80px; top: 12px; right: 12px; }
      .prompter-text { font-size: var(--prompter-size-mobile, 26px); padding: 0 8px; }
      .prompter-text-wrap { padding: 0 16px; }
      .prompter-controls { padding: 8px 14px; gap: 6px; bottom: 24px; font-size: 12px; }
      .prompter-controls .ctrl-btn { font-size: 16px; padding: 2px 4px; }
      .prompter-controls .speed-group input[type="range"] { width: 40px; }
      .coach-speed, .coach-filler { font-size: 10px; padding: 2px 10px; }
    }
    @media (max-width: 480px) {
      .home-grid { grid-template-columns: 1fr 1fr; }
      .home-header h1 { font-size: 18px; }
      .home-header h1 span { font-size: 11px; padding: 1px 10px; }
      .prompter-text { font-size: var(--prompter-size-mobile, 22px); }
      .prompter-controls { padding: 6px 10px; gap: 4px; bottom: 16px; border-radius: 30px; }
      .prompter-controls .ctrl-btn { font-size: 14px; }
      .prompter-controls .speed-group input[type="range"] { width: 30px; }
      .cam-compact { width: 90px; height: 60px; top: 8px; right: 8px; }
    }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-secondary); opacity: 0.6; font-size: 13px; }
  </style>
</head>
<body>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <!-- ===== MODAL CONTAINER ===== -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box" id="modal-box">
      <button class="close-btn" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app">

    <!-- HOME PAGE -->
    <div id="home-page" class="page active">
      <header class="home-header">
        <h1>🎙️ Promptica <span>Studio</span></h1>
        <div class="status-badge">
          <span class="dot"></span>
          <span id="home-status">Ready</span>
          <span style="margin-left:12px; font-size:12px;" id="streak-badge">🔥 0-day</span>
        </div>
      </header>
      <div class="home-actions">
        <button class="btn btn-primary" id="btn-new-script">+ New Script</button>
        <button class="btn" id="btn-import-script">📄 Import</button>
        <button class="btn" id="btn-admin" style="opacity:0.4;font-size:12px;padding:4px 12px;">⚙️ Admin</button>
      </div>
      <div class="home-grid" id="home-grid">
        <!-- Cards injected by JS -->
      </div>
    </div>

    <!-- EDITOR PAGE -->
    <div id="editor-page" class="page">
      <div class="editor-topbar">
        <button class="back-btn" id="editor-back">←</button>
        <input type="text" class="script-title-input" id="script-title-input" placeholder="Script title..." value="Untitled" />
        <div class="editor-actions">
          <button class="btn" id="btn-save-script">💾 Save</button>
          <button class="btn btn-primary" id="btn-enter-prompter">▶ Enter</button>
        </div>
      </div>
      <div class="editor-body">
        <div class="editor-textarea-wrapper">
          <textarea id="script-textarea" placeholder="Paste or type your script here…" spellcheck="true"></textarea>
        </div>
        <div class="editor-toolbar" id="editor-toolbar">
          <div class="setting"><label>Speed</label><input type="range" id="setting-speed" min="1" max="10" step="0.5" value="5" /><span id="speed-label" style="min-width:22px;font-weight:500;color:var(--text-primary);">5</span></div>
          <div class="setting"><label>Font</label><select id="setting-font"><option value="'Inter', sans-serif">Inter</option><option value="'Roboto', sans-serif">Roboto</option><option value="'SF Pro Display', sans-serif">SF Pro</option></select></div>
          <div class="setting"><label>Size</label><select id="setting-size"><option value="24">24</option><option value="28">28</option><option value="34" selected>34</option><option value="42">42</option><option value="50">50</option></select></div>
          <div class="setting"><label>Text</label><input type="color" id="setting-text-color" value="#f5efe8" /></div>
          <div class="setting"><label>Bg</label><input type="color" id="setting-bg-color" value="#0b0b0b" /></div>
          <div class="setting"><label>Opacity</label><input type="range" id="setting-bg-opacity" min="0.3" max="1" step="0.05" value="1" /><span id="opacity-label" style="min-width:24px;font-weight:500;">1.0</span></div>
          <div class="separator"></div>
          <div class="setting"><div class="toggle-group"><span class="toggle-label">Mirror</span><div class="toggle" id="toggle-mirror"><div class="knob"></div></div></div></div>
          <div class="setting"><div class="toggle-group"><span class="toggle-label">Focus</span><div class="toggle active" id="toggle-focus"><div class="knob"></div></div></div></div>

  <!-- ============================================================= -->
  <!--  JAVASCRIPT – Full Application                                 -->
  <!-- ============================================================= -->
  <script>
    (function() {
      'use strict';

      // ===== UTILITIES =====
      const $ = s => document.querySelector(s);
      const $$ = s => document.querySelectorAll(s);
      const toast = (msg, dur = 3000) => {
        const el = $('#toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), dur);
      };
      const formatTime = s => { const m = String(Math.floor(s/60)).padStart(2,'0'); const sec = String(Math.floor(s%60)).padStart(2,'0'); return `${m}:${sec}`; };
      const escapeHtml = str => { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; };

      // ===== INDEXEDDB =====
      const DB_NAME = 'PrompticaDB';
      const STORE_NAME = 'scripts';
      let db = null;
      function openDB() {
        return new Promise((res, rej) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            if (!db.objectStoreNames.contains('content')) db.createObjectStore('content', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', { keyPath: 'id', autoIncrement: true });
          };
          req.onsuccess = () => { db = req.result; res(db); };
          req.onerror = () => rej(req.error);
        });
      }
      async function getAllScripts() { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction(STORE_NAME,'readonly'); const req=tx.objectStore(STORE_NAME).getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
      async function saveScript(script) { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction(STORE_NAME,'readwrite'); const req=tx.objectStore(STORE_NAME).put(script); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
      async function deleteScript(id) { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction(STORE_NAME,'readwrite'); const req=tx.objectStore(STORE_NAME).delete(id); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
      async function getContent() { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction('content','readonly'); const req=tx.objectStore('content').get('main'); req.onsuccess=()=>res(req.result || { id:'main', articles:[], speakEasy:[], tips:[] }); req.onerror=()=>rej(req.error); }); }
      async function saveContent(content) { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction('content','readwrite'); const req=tx.objectStore('content').put({ ...content, id:'main' }); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
      async function saveSession(session) { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction('sessions','readwrite'); const req=tx.objectStore('sessions').add(session); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
      async function getSessions() { if(!db) await openDB(); return new Promise((res,rej) => { const tx=db.transaction('sessions','readonly'); const req=tx.objectStore('sessions').getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }

      // ===== STATE =====
      const state = {
        scripts: [],
        currentScriptId: null,
        settings: { speed:5, fontFamily:"'Inter', sans-serif", fontSize:34, textColor:'#f5efe8', bgColor:'#0b0b0b', bgOpacity:1, mirror:false, focus:true, vad:false },
        isPlaying: false,
        scrollProgress: 0,
        textHeight: 0,
        viewportHeight: 0,
        maxScrollPx: 0,
        animFrameId: null,
        lastTimestamp: 0,
        cameraStream: null,
        isRecording: false,
        mediaRecorder: null,
        recordedChunks: [],
        recordStartTime: 0,
        recordTimerInterval: null,
        vadEnabled: false,
        audioContext: null,
        analyser: null,
        vadThreshold: 0.04,
        vadHoldTimer: null,
        vadSpeaking: false,
        // Coach
        coachActive: false,
        fillerCount: 0,
        speedLight: 'ok', // ok, slow, fast
        confidence: 0,
        sessionStart: 0,
        // Camera mode: 'full' or 'compact'
        camMode: 'full',
        camCompactPos: { x: 20, y: 20, w: 180, h: 120 },
        // Streak
        streakData: { lastPracticeDate: null, currentStreak: 0, longestStreak: 0, lastRecordingDate: null, recordingStreak: 0, longestRecordingStreak: 0, totalSessions: 0 },
        // Content
        content: { articles: [], speakEasy: [], tips: [] },
        // Admin
        adminPassword: 'promptica2025',
        isAdmin: false,
        githubToken: null,
        repo: null,
        // Recording raw
        rawRecorder: null,
        rawChunks: [],
      };

      // ===== DOM REFS =====
      const homePage = $('#home-page');
      const editorPage = $('#editor-page');
      const prompterPage = $('#prompter-page');
      const homeGrid = $('#home-grid');
      const btnNew = $('#btn-new-script');
      const btnImport = $('#btn-import-script');
      const btnAdmin = $('#btn-admin');
      const editorBack = $('#editor-back');
      const scriptTitle = $('#script-title-input');
      const scriptText = $('#script-textarea');
      const btnSave = $('#btn-save-script');
      const btnEnter = $('#btn-enter-prompter');
      const settingSpeed = $('#setting-speed');
      const speedLabel = $('#speed-label');
      const settingFont = $('#setting-font');
      const settingSize = $('#setting-size');
      const settingTextColor = $('#setting-text-color');
      const settingBgColor = $('#setting-bg-color');
      const settingBgOpacity = $('#setting-bg-opacity');
      const opacityLabel = $('#opacity-label');
      const toggleMirror = $('#toggle-mirror');
      const toggleFocus = $('#toggle-focus');
      const toggleVad = $('#toggle-vad');
      const btnCalibrate = $('#btn-calibrate');
      const btnSummarize = $('#btn-summarize');

      const prompterViewport = $('#prompter-viewport');
      const prompterTextWrap = $('#prompter-text-wrap');
      const prompterText = $('#prompter-text');
      const progressFill = $('#progress-fill');
      const ctrlPlay = $('#ctrl-play');
      const ctrlPlayIcon = $('#ctrl-play-icon');
      const ctrlSpeed = $('#ctrl-speed');
      const ctrlSpeedLabel = $('#ctrl-speed-label');
      const ctrlMirror = $('#ctrl-mirror');
      const ctrlFocus = $('#ctrl-focus');
      const ctrlRecord = $('#ctrl-record');
      const ctrlExit = $('#ctrl-exit');
      const ctrlCoach = $('#ctrl-coach');
      const prompterControls = $('#prompter-controls');
      const prompterBack = $('#prompter-back');

      const camBg = $('#cam-bg');
      const camBgVideo = $('#cam-bg-video');
      const camCompact = $('#cam-compact');
      const camCompactVideo = $('#cam-compact-video');
      const camToggle = $('#cam-toggle');
      const resizeHandle = $('#resize-handle');

      const coachIndicators = $('#coach-indicators');
      const speedLight = $('#speed-light');
      const speedLabelCoach = $('#speed-label-coach');
      const fillerCount = $('#filler-count');
      const confidenceScore = $('#confidence-score');
      const breathCircle = $('#breath-circle');

      const modalOverlay = $('#modal-overlay');
      const modalContent = $('#modal-content');
      const modalClose = $('#modal-close');
      const streakBadge = $('#streak-badge');

      // ===== PAGE ROUTING =====
      function showPage(id) { $$('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

      // ===== SETTINGS UI =====
      function applySettingsToUI(s) {
        settingSpeed.value = s.speed; speedLabel.textContent = s.speed;
        settingFont.value = s.fontFamily;
        settingSize.value = s.fontSize;
        settingTextColor.value = s.textColor;
        settingBgColor.value = s.bgColor;
        settingBgOpacity.value = s.bgOpacity;
        opacityLabel.textContent = s.bgOpacity.toFixed(2);
        toggleMirror.classList.toggle('active', s.mirror);
        toggleFocus.classList.toggle('active', s.focus);
        toggleVad.classList.toggle('active', s.vad || false);
        state.vadEnabled = s.vad || false;
        if (prompterPage.classList.contains('active')) applyPrompterStyles();
      }
      function readSettingsFromUI() {
        state.settings.speed = parseFloat(settingSpeed.value);
        state.settings.fontFamily = settingFont.value;
        state.settings.fontSize = parseInt(settingSize.value);
        state.settings.textColor = settingTextColor.value;
        state.settings.bgColor = settingBgColor.value;
        state.settings.bgOpacity = parseFloat(settingBgOpacity.value);
        state.settings.mirror = toggleMirror.classList.contains('active');
        state.settings.focus = toggleFocus.classList.contains('active');
        state.settings.vad = toggleVad.classList.contains('active');
        state.vadEnabled = state.settings.vad;
        localStorage.setItem('prompter_global_settings', JSON.stringify(state.settings));
        return state.settings;
      }

      // ===== HOME =====
      const homeCards = [
        { icon: '🚀', title: 'Quick Start', desc: 'New script → prompter', action: 'quickstart' },
        { icon: '⏯️', title: 'Continue', desc: 'Last edited script', action: 'continue' },
        { icon: '📄', title: 'My Scripts', desc: 'View all scripts', action: 'scripts' },
        { icon: '📋', title: 'Templates', desc: 'Pre‑built structures', action: 'templates' },
        { icon: '📚', title: 'Learn Hub', desc: 'Tutorials & FAQs', action: 'learn' },
        { icon: '📊', title: 'Stats', desc: 'Your activity summary', action: 'stats' },
        { icon: '⏳', title: 'Activity', desc: 'Recent actions', action: 'activity' },
        { icon: '💾', title: 'Export All', desc: 'Backup scripts', action: 'export' },
        { icon: '📤', title: 'Import Folder', desc: 'Upload multiple', action: 'importfolder' },
        { icon: '🎯', title: 'Calibrate', desc: 'Reading speed', action: 'calibrate' },
        { icon: '🎨', title: 'Theme', desc: 'Dark / Light', action: 'theme' },
        { icon: '⌨️', title: 'Shortcuts', desc: 'Keyboard guide', action: 'shortcuts' },
        { icon: '🔗', title: 'Share Script', desc: 'Link / QR', action: 'share' },
        { icon: '🗑️', title: 'Trash', desc: 'Deleted scripts', action: 'trash' },
        { icon: '⚙️', title: 'Settings', desc: 'Global preferences', action: 'settings' },
        { icon: '🎤', title: 'SpeakEasy', desc: 'Public speaking coach', action: 'speakeasy' },
      ];

      function renderHome() {
        homeGrid.innerHTML = homeCards.map(c => `
          <div class="home-card" data-action="${c.action}">
            <div class="icon">${c.icon}</div>
            <div class="title">${c.title}</div>
            <div class="desc">${c.desc}</div>
            ${c.action === 'speakeasy' ? `<div class="badge">🔥 ${state.streakData.currentStreak}‑day streak</div>` : ''}
          </div>
        `).join('');
        homeGrid.querySelectorAll('.home-card').forEach(el => {
          el.addEventListener('click', () => handleHomeAction(el.dataset.action));
        });
        updateStreakBadge();
      }

      function handleHomeAction(action) {
        switch(action) {
          case 'quickstart': newScript(); break;
          case 'continue': continueLast(); break;
          case 'scripts': showPage('home-page'); break; // already there
          case 'templates': showModal('Templates', '<p>Coming soon: template library.</p>'); break;
          case 'learn': showLearnHub(); break;
          case 'stats': showStats(); break;
          case 'activity': showActivity(); break;
          case 'export': exportAllScripts(); break;
          case 'importfolder': importFolder(); break;
          case 'calibrate': startCalibration(); break;
          case 'theme': toggleTheme(); break;
          case 'shortcuts': showShortcuts(); break;
          case 'share': shareScript(); break;
          case 'trash': showTrash(); break;
          case 'settings': showSettingsModal(); break;
          case 'speakeasy': showSpeakEasy(); break;
          default: toast('Feature coming soon');
        }
      }

      // ===== SCRIPTS =====
      async function continueLast() {
        const scripts = await getAllScripts();
        if (!scripts.length) { toast('No scripts yet'); return; }
        const last = scripts.sort((a,b) => b.updatedAt - a.updatedAt)[0];
        openScript(last.id);
      }

      async function openScript(id) {
        const scripts = await getAllScripts();
        const script = scripts.find(s => s.id === id);
        if (!script) return toast('Script not found');
        state.currentScriptId = id;
        scriptTitle.value = script.title || 'Untitled';
        scriptText.value = script.content || '';
        if (script.settings) Object.assign(state.settings, script.settings);
        applySettingsToUI(state.settings);
        showPage('editor-page');
        scriptText.focus();
      }

      async function newScript() {
        const data = { title: 'Untitled', content: '', updatedAt: Date.now(), settings: { ...state.settings } };
        const id = await saveScript(data);
        state.currentScriptId = id;
        scriptTitle.value = 'Untitled';
        scriptText.value = '';
        applySettingsToUI(state.settings);
        showPage('editor-page');
        scriptText.focus();
      }

      async function saveCurrentScript() {
        if (!state.currentScriptId) return;
        const data = { id: state.currentScriptId, title: scriptTitle.value.trim() || 'Untitled', content: scriptText.value, updatedAt: Date.now(), settings: { ...state.settings } };
        await saveScript(data);
        toast('Saved');
      }

      let autoSaveTimer = null;
      function autoSaveScript() { clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(saveCurrentScript, 600); }

      // ===== IMPORT / EXPORT =====
      function importFolder() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt,.md';
        input.multiple = true;
        input.onchange = async (e) => {
          const files = e.target.files;
          for (const file of files) {
            const text = await file.text();
            const data = { title: file.name.replace(/\.[^.]+$/,''), content: text, updatedAt: Date.now(), settings: { ...state.settings } };
            await saveScript(data);
          }
          toast(`Imported ${files.length} scripts`);
          renderHome();
        };
        input.click();
      }

      async function exportAllScripts() {
        const scripts = await getAllScripts();
        if (!scripts.length) { toast('No scripts to export'); return; }
        const blob = new Blob([JSON.stringify(scripts, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `promptica_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('Exported');
      }

      // ===== MODAL =====
      function showModal(title, html) {
        modalContent.innerHTML = `<h2>${title}</h2>${html}`;
        modalOverlay.classList.add('active');
      }
      modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
      modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

      // ===== LEARN HUB =====
      async function showLearnHub() {
        const content = await getContent();
        let articlesHtml = content.articles.map(a => `<div style="margin-bottom:12px;border-bottom:1px solid var(--border-color);padding-bottom:10px;"><h3>${a.title}</h3><p style="color:var(--text-secondary);font-size:14px;">${a.content.slice(0,200)}...</p></div>`).join('');
        showModal('📚 Learn Hub', `
          <p style="margin-bottom:16px;">Tips, tutorials, and best practices to master Promptica.</p>
          ${articlesHtml || '<p style="color:var(--text-secondary);">No articles yet. Admin can add them.</p>'}
          <button class="btn btn-primary" onclick="document.getElementById('modal-close').click()">Close</button>
        `);
      }

      // ===== STATS =====
      async function showStats() {
        const scripts = await getAllScripts();
        const sessions = await getSessions();
        const totalTime = sessions.reduce((acc, s) => acc + (s.duration || 0), 0);
        showModal('📊 Your Stats', `
          <p><strong>Total scripts:</strong> ${scripts.length}</p>
          <p><strong>Total practice time:</strong> ${formatTime(totalTime)}</p>
          <p><strong>Practice sessions:</strong> ${sessions.length}</p>
          <p><strong>Longest streak:</strong> ${state.streakData.longestStreak} days</p>
          <p><strong>Recording streak:</strong> ${state.streakData.recordingStreak} days</p>
          <button class="btn btn-primary" onclick="document.getElementById('modal-close').click()">Close</button>
        `);
      }

      // ===== ACTIVITY =====
      async function showActivity() {
        const sessions = await getSessions();
        const recent = sessions.sort((a,b) => b.timestamp - a.timestamp).slice(0,10);
        const html = recent.map(s => `<div style="padding:8px 0;border-bottom:1px solid var(--border-color);">${new Date(s.timestamp).toLocaleString()} — ${s.duration ? formatTime(s.duration) : 'Practice'} (Confidence: ${s.confidence || 0}%)</div>`).join('');
        showModal('⏳ Recent Activity', html || '<p>No activity yet.</p>');
      }

      // ===== SHORTCUTS =====
      function showShortcuts() {
        showModal('⌨️ Keyboard Shortcuts', `
          <table style="width:100%;border-collapse:collapse;font-size:14px;color:var(--text-secondary);">
            <tr><td style="padding:6px 0;"><kbd>Space</kbd></td><td>Play/Pause</td></tr>
            <tr><td style="padding:6px 0;"><kbd>↑</kbd> <kbd>↓</kbd></td><td>Speed up/down</td></tr>
            <tr><td style="padding:6px 0;"><kbd>Esc</kbd></td><td>Exit prompter</td></tr>
            <tr><td style="padding:6px 0;"><kbd>M</kbd></td><td>Mirror toggle</td></tr>
            <tr><td style="padding:6px 0;"><kbd>F</kbd></td><td>Focus toggle</td></tr>
            <tr><td style="padding:6px 0;"><kbd>R</kbd></td><td>Record toggle</td></tr>
            <tr><td style="padding:6px 0;"><kbd>Ctrl+Enter</kbd></td><td>Enter prompter</td></tr>
          </table>
        `);
      }

      // ===== THEME =====
      let themeIndex = 0;
      const themes = [
        { bg: '#0b0b0b', text: '#f5efe8', name: 'Dark' },
        { bg: '#f5efe8', text: '#0b0b0b', name: 'Light' },
        { bg: '#1a1a2e', text: '#e0e0ff', name: 'Deep Blue' },
      ];
      function toggleTheme() {
        themeIndex = (themeIndex + 1) % themes.length;
        const t = themes[themeIndex];
        document.documentElement.style.setProperty('--bg-primary', t.bg);
        document.documentElement.style.setProperty('--text-primary', t.text);
        toast(`Theme: ${t.name}`);
        localStorage.setItem('promptica_theme', JSON.stringify(t));
      }

      // ===== TRASH (placeholder) =====
      function showTrash() { showModal('🗑️ Trash', '<p style="color:var(--text-secondary);">Deleted scripts will appear here soon.</p>'); }

      // ===== SHARE SCRIPT =====
      function shareScript() {
        const url = window.location.href;
        if (navigator.share) { navigator.share({ title: 'Promptica Script', text: 'Check out my script!', url }); }
        else { navigator.clipboard.writeText(url); toast('Link copied!'); }
      }

      // ===== SETTINGS MODAL =====
      function showSettingsModal() {
        showModal('⚙️ Global Settings', `
          <p>Default font, speed, and theme preferences will be saved.</p>

          <button class="btn btn-primary" onclick="document.getElementById('modal-close').click()">Close</button>
        `);
      }

      // ===== SPEAKEASY (Public Speaking Coach) =====
      async function showSpeakEasy() {
        const content = await getContent();
        let categories = content.speakEasy || [];
        let html = categories.map(cat => `
          <div style="margin-bottom:16px;border-bottom:1px solid var(--border-color);padding-bottom:12px;">
            <h3>${cat.icon || '🎤'} ${cat.name}</h3>
            <p style="color:var(--text-secondary);font-size:14px;">${cat.description || ''}</p>
            ${cat.articles ? cat.articles.map(a => `<div style="font-size:13px;padding:4px 0;color:var(--text-primary);">• ${a}</div>`).join('') : ''}
          </div>
        `).join('');
        showModal('🎤 SpeakEasy – Public Speaking Coach', `
          <p style="margin-bottom:16px;">Your personal coach to master public speaking. Track your progress and practice with real‑time feedback.</p>
          <div style="background:var(--bg-panel);padding:12px;border-radius:8px;margin-bottom:16px;">
            <strong>🔥 Streak:</strong> ${state.streakData.currentStreak} days &nbsp;|&nbsp; <strong>🎙️ Sessions:</strong> ${state.streakData.totalSessions}

          <button class="btn" id="start-coach-session" style="margin-left:8px;">Start Practice</button>
        `);
