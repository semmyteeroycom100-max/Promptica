<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Promptica · Studio Prompter</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0b0b0b; --bg-secondary: #161616; --bg-panel: #1e1e1e;
      --bg-card: #1a1a1a; --bg-sidebar: #111111; --border-color: #2c2c2c;
      --text-primary: #f0ece6; --text-secondary: #a8a29e;
      --accent: #8b7a6b; --accent-hover: #a89484;
      --shadow: 0 20px 60px rgba(0,0,0,0.8); --radius: 12px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --transition: 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --sidebar-width: 200px;
    }
    html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #app { display: flex; height: 100vh; overflow: hidden; background: var(--bg-primary); }

    /* ===== SIDEBAR ===== */
    #sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 20px 0; }
    #sidebar .logo { padding: 0 20px 30px 20px; font-size: 20px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    #sidebar .logo span { background: var(--accent); color: #0b0b0b; font-size: 11px; padding: 1px 8px; border-radius: 30px; }
    .nav-item { padding: 10px 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); border-left: 2px solid transparent; font-size: 14px; }
    .nav-item:hover { background: var(--bg-panel); color: var(--text-primary); }
    .nav-item.active { color: var(--text-primary); border-left-color: var(--accent); background: var(--bg-panel); }
    .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
    #sidebar .bottom { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); }

    /* ===== CONTENT AREA ===== */
    #content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); }

    /* ===== PAGES ===== */
    .page { display: none; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; padding: 24px 28px; }
    .page.active { display: flex; }

    /* ===== HOME PAGE DASHBOARD ===== */
    .hero-panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .hero-panel .greeting { font-size: 22px; font-weight: 600; }
    .hero-panel .stats { display: flex; gap: 24px; flex-wrap: wrap; font-size: 14px; color: var(--text-secondary); }
    .hero-panel .stats strong { color: var(--text-primary); }
    .hero-panel .btn-large { background: var(--accent); border: none; color: #0b0b0b; padding: 10px 24px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.2s; }
    .hero-panel .btn-large:hover { background: var(--accent-hover); }

    .activity-timeline { margin-bottom: 24px; }
    .activity-timeline h3 { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
    .activity-item { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
    .activity-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .activity-item .dot.green { background: #4caf50; }
    .activity-item .dot.yellow { background: #ffb74d; }
    .activity-item .dot.red { background: #ef5350; }
    .activity-item .info { flex: 1; font-size: 14px; }
    .activity-item .info .time { color: var(--text-secondary); font-size: 12px; }
    .activity-item .score { font-weight: 500; }

    .daily-spark { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 18px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
    .daily-spark .icon { font-size: 28px; }
    .daily-spark .content { flex: 1; }
    .daily-spark .content .label { font-size: 12px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; }
    .daily-spark .content .tip { font-size: 16px; font-weight: 500; }
    .daily-spark .btn-link { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; }

    .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 8px; }
    .quick-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .quick-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .quick-card .icon { font-size: 24px; }
    .quick-card .title { font-size: 13px; font-weight: 500; margin-top: 4px; }

    /* ===== EDITOR PAGE (unchanged) ===== */
    #editor-page .editor-topbar { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; flex-wrap: wrap; }
    #editor-page .editor-topbar .back-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; }
    #editor-page .editor-topbar .script-title-input { background: transparent; border: none; color: var(--text-primary); font-size: 18px; font-weight: 500; flex: 1; outline: none; min-width: 120px; }
    #editor-page .editor-topbar .editor-actions { display: flex; gap: 8px; }
    #editor-page .editor-topbar .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-primary); cursor: pointer; font-size: 13px; }
    #editor-page .editor-topbar .btn-primary { background: var(--accent); border-color: var(--accent); color: #0b0b0b; }
    .editor-textarea-wrapper { flex: 1; min-height: 0; }
    .editor-textarea-wrapper textarea { width: 100%; height: 100%; padding: 16px; background: #111; color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius); font-family: var(--font-sans); font-size: 16px; line-height: 1.8; resize: none; outline: none; }
    .editor-toolbar { display: flex; flex-wrap: wrap; gap: 10px 16px; padding: 12px 0; border-top: 1px solid var(--border-color); margin-top: 12px; }
    .editor-toolbar .setting { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
    .editor-toolbar .setting input[type="range"] { width: 70px; accent-color: var(--accent); background: transparent; }
    .editor-toolbar .setting select, .editor-toolbar .setting input[type="color"] { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 8px; }
    .editor-toolbar .toggle-group { display: flex; align-items: center; gap: 6px; }
    .editor-toolbar .toggle { position: relative; width: 34px; height: 18px; background: var(--bg-input); border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.25s; }
    .editor-toolbar .toggle.active { background: var(--accent); }
    .editor-toolbar .toggle .knob { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: transform 0.25s; }
    .editor-toolbar .toggle.active .knob { transform: translateX(16px); }
    .editor-toolbar .separator { width: 1px; height: 24px; background: var(--border-color); }

    /* ===== PROMPTER PAGE (unchanged) ===== */
    #prompter-page { position: fixed; inset: 0; z-index: 2000; background: var(--bg-primary); display: none; flex-direction: column; overflow: hidden; }
    #prompter-page.active { display: flex; }
    .prompter-viewport { flex: 1; position: relative; overflow: hidden; background: var(--prompter-bg, #0b0b0b); display: flex; align-items: center; justify-content: center; }
    .prompter-viewport::before, .prompter-viewport::after { content: ''; position: absolute; left: 0; right: 0; z-index: 10; pointer-events: none; height: 18%; }
    .prompter-viewport::before { top: 0; background: linear-gradient(to bottom, var(--prompter-bg, #0b0b0b), transparent); }
    .prompter-viewport::after { bottom: 0; background: linear-gradient(to top, var(--prompter-bg, #0b0b0b), transparent); }
    .prompter-viewport.no-focus::before, .prompter-viewport.no-focus::after { opacity: 0; }
    .prompter-text-wrap { position: relative; width: 100%; max-width: 820px; padding: 0 40px; margin: 0 auto; will-change: transform; transform: translateY(0px); }
    .prompter-text-wrap.mirror { transform: scaleX(-1) translateY(0px) !important; }
    .prompter-text { font-family: var(--prompter-font, 'Inter'); font-size: var(--prompter-size, 34px); font-weight: 400; line-height: 1.6; color: var(--prompter-color, #f5efe8); letter-spacing: 0.3px; word-break: break-word; text-shadow: 0 1px 4px rgba(0,0,0,0.15); padding: 4px 0; user-select: none; }
    .prompter-text p { margin-bottom: 0.4em; }
    .prompter-progress { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 20; pointer-events: none; }
    .prompter-progress .fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.15s linear; }
    .cam-bg { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
    .cam-bg video { width: 100%; height: 100%; object-fit: cover; filter: blur(var(--blur, 24px)); transform: scale(1.05); }
    .cam-bg .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
    .cam-compact { position: absolute; z-index: 25; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.15); background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); cursor: grab; touch-action: none; width: 180px; height: 120px; top: 20px; right: 20px; display: none; }
    .cam-compact video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .cam-compact .resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; background: rgba(255,255,255,0.2); border-radius: 0 0 12px 0; }
    .cam-toggle { position: absolute; z-index: 26; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 30px; padding: 4px 12px; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px); }
    .prompter-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(10,10,10,0.75); backdrop-filter: blur(18px); border-radius: 60px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 12px 40px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
    .prompter-controls.visible { opacity: 1; pointer-events: auto; }
    .prompter-controls .ctrl-btn { background: none; border: none; color: var(--text-primary); font-size: 18px; cursor: pointer; padding: 4px 8px; opacity: 0.7; transition: 0.2s; }
    .prompter-controls .ctrl-btn:hover { opacity: 1; }
    .prompter-controls .ctrl-btn.active { opacity: 1; color: var(--accent); }
    .prompter-controls .ctrl-separator { width: 1px; height: 24px; background: rgba(255,255,255,0.08); }
    .prompter-controls .speed-group { display: flex; align-items: center; gap: 6px; }
    .prompter-controls .speed-group input[type="range"] { width: 60px; accent-color: var(--accent); background: transparent; cursor: pointer; }
    .prompter-controls .speed-value { min-width: 22px; text-align: center; font-size: 13px; font-weight: 500; }

    .coach-indicators { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
    .coach-speed { position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .coach-speed .light { width: 12px; height: 12px; border-radius: 50%; background: #4caf50; transition: background 0.3s; }
    .coach-speed .light.slow { background: #f44336; }
    .coach-speed .light.fast { background: #ff9800; }
    .coach-filler { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 12px; }
    .coach-filler span { color: #ff6b6b; font-weight: 600; }
    .coach-confidence { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 4px 16px; border-radius: 30px; backdrop-filter: blur(4px); font-size: 14px; font-weight: 500; }
    .coach-breath { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); animation: breath 4s ease-in-out infinite; display: none; }
    @keyframes breath { 0%,100% { transform: translateX(-50%) scale(0.8); opacity: 0.3; } 50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; } }
    .prompter-back { position: absolute; top: 16px; left: 16px; z-index: 35; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 30px; padding: 6px 14px; font-size: 14px; cursor: pointer; backdrop-filter: blur(4px); }

    /* ===== MODALS ===== */
    .modal-overlay { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 20px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px 32px; box-shadow: var(--shadow); }
    .modal-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
    .modal-box .close-btn { float: right; background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
    .modal-box .btn { padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; cursor: pointer; transition: 0.2s; }
    .modal-box .btn-primary { background: var(--accent); border-color: var(--accent); color: #0b0b0b; }
    .modal-box .btn-primary:hover { background: var(--accent-hover); }
    .modal-box video { width: 100%; border-radius: 8px; background: #000; margin: 12px 0; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); color: var(--text-primary); padding: 12px 24px; border-radius: 40px; border: 1px solid var(--border-color); box-shadow: var(--shadow); z-index: 9999; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; backdrop-filter: blur(12px); }
    .toast.show { opacity: 1; }

    @media (max-width: 768px) {
      :root { --sidebar-width: 56px; }
      #sidebar .logo span, #sidebar .nav-item .label { display: none; }
      #sidebar .nav-item { padding: 12px; justify-content: center; }
      .hero-panel { flex-direction: column; align-items: stretch; gap: 12px; }
      .hero-panel .stats { gap: 12px; }
      .quick-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .page { padding: 16px; }
    }
    @media (max-width: 480px) {
      .quick-grid { grid-template-columns: 1fr 1fr; }
      .daily-spark { flex-direction: column; align-items: flex-start; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box" id="modal-box">
      <button class="close-btn" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app">

    <!-- ===== SIDEBAR ===== -->
    <nav id="sidebar">
      <div class="logo">🎙️ Promptica <span>Studio</span></div>
      <div class="nav-item active" data-page="home-page"><span class="icon">🏠</span><span class="label">Dashboard</span></div>
      <div class="nav-item" data-page="editor-page"><span class="icon">📝</span><span class="label">My Scripts</span></div>
      <div class="nav-item" data-page="home-page" data-action="speakeasy"><span class="icon">🎤</span><span class="label">SpeakEasy</span></div>
      <div class="nav-item" data-page="home-page" data-action="learn"><span class="icon">📚</span><span class="label">Learn Hub</span></div>
      <div class="nav-item bottom" data-page="home-page" data-action="settings"><span class="icon">⚙️</span><span class="label">Settings</span></div>
    </nav>

    <!-- ===== CONTENT AREA ===== -->
    <div id="content">

      <!-- ========== HOME PAGE ========== -->
      <div id="home-page" class="page active">
        <!-- Hero Panel -->
        <div class="hero-panel" id="hero-panel">
          <div>
            <div class="greeting" id="greeting">👋 Good morning, Creator!</div>
            <div class="stats" id="hero-stats">
              <span>🔥 <strong id="hero-streak">0</strong>‑day streak</span>
              <span>⏱️ <strong id="hero-time">0h 0m</strong> practice</span>
              <span>📄 <strong id="hero-scripts">0</strong> scripts</span>
            </div>
          </div>
          <button class="btn-large" id="hero-start-session">🎙️ Start New Session</button>
        </div>

        <!-- Activity Timeline -->
        <div class="activity-timeline">
          <h3>📋 Recent Activity</h3>
          <div id="activity-list"></div>
        </div>

        <!-- Daily Spark -->
        <div class="daily-spark" id="daily-spark">
          <div class="icon">💡</div>
          <div class="content">
            <div class="label">Tip of the Day</div>
            <div class="tip" id="tip-text">Pause for 3 seconds after every key point.</div>
          </div>
          <button class="btn-link" id="tip-more">View all →</button>
        </div>

        <!-- Quick Access Grid -->
        <div style="margin-top: 8px;">
          <h3 style="font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px;">Quick Access</h3>
          <div class="quick-grid" id="quick-grid">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>

      <!-- ========== EDITOR PAGE ========== -->
      <div id="editor-page" class="page">
        <div class="editor-topbar">
          <button class="back-btn" id="editor-back">←</button>
          <input type="text" class="script-title-input" id="script-title-input" placeholder="Script title..." value="Untitled" />
          <div class="editor-actions">
            <button class="btn" id="btn-save-script">💾 Save</button>
            <button class="btn btn-primary" id="btn-enter-prompter">▶ Enter</button>
          </div>
        </div>
        <div class="editor-textarea-wrapper">
          <textarea id="script-textarea" placeholder="Paste or type your script here…" spellcheck="true"></textarea>
        </div>
        <div class="editor-toolbar" id="editor-toolbar">
          <div class="setting"><label>Speed</label><input type="range" id="setting-speed" min="1" max="10" step="0.5" value="5" /><span id="speed-label" style="min-width:22px;font-weight:500;">5</span></div>
          <div class="setting"><label>Font</label><select id="setting-font"><option value="'Inter', sans-serif">Inter</option><option value="'Roboto', sans-serif">Roboto</option><option value="'SF Pro Display', sans-serif">SF Pro</option></select></div>
          <div class="setting"><label>Size</label><select id="setting-size"><option value="24">24</option><option value="28">28</option><option value="34" selected>34</option><option value="42">42</option><option value="50">50</option></select></div>
          <div class="setting"><label>Text</label><input type="color" id="setting-text-color" value="#f5efe8" /></div>
          <div class="setting"><label>Bg</label><input type="color" id="setting-bg-color" value="#0b0b0b" /></div>
          <div class="setting"><label>Opacity</label><input type="range" id="setting-bg-opacity" min="0.3" max="1" step="0.05" value="1" /><span id="opacity-label" style="min-width:24px;font-weight:500;">1.0</span></div>
          <div class="separator"></div>
          <div class="setting"><div class="toggle-group"><span class="toggle-label">Mirror</span><div class="toggle" id="toggle-mirror"><div class="knob"></div></div></div></div>
          <div class="setting"><div class="toggle-group"><span class="toggle-label">Focus</span><div class="toggle active" id="toggle-focus"><div class="knob"></div></div></div></div>
          <div class="setting"><div class="toggle-group"><span class="toggle-label">🎤 VAD</span><div class="toggle" id="toggle-vad"><div class="knob"></div></div></div></div>
          <div class="setting"><button class="btn" id="btn-calibrate" style="font-size:12px;padding:4px 12px;">📊 Calibrate</button></div>
        </div>
      </div>

      <!-- ========== PROMPTER PAGE ========== -->
      <div id="prompter-page">
        <div class="prompter-viewport" id="prompter-viewport">
          <div class="cam-bg" id="cam-bg" style="display:none;">
            <video id="cam-bg-video" autoplay muted playsinline></video>
            <div class="overlay"></div>
          </div>
          <div class="cam-compact" id="cam-compact" style="display:none;">
            <video id="cam-compact-video" autoplay muted playsinline></video>
            <div class="resize-handle" id="resize-handle"></div>
          </div>
          <button class="cam-toggle" id="cam-toggle">📷 Full</button>

          <div class="prompter-progress"><div class="fill" id="progress-fill"></div></div>
          <div class="prompter-text-wrap" id="prompter-text-wrap">
            <div class="prompter-text" id="prompter-text"></div>
          </div>

          <button class="prompter-back" id="prompter-back">← Back</button>

          <div class="coach-indicators" id="coach-indicators" style="display:none;">
            <div class="coach-speed"><span class="light" id="speed-light"></span><span id="speed-label-coach">Pace</span></div>
            <div class="coach-filler">Filler: <span id="filler-count">0</span></div>
            <div class="coach-confidence" id="confidence-score">Confidence: 0%</div>
            <div class="coach-breath" id="breath-circle"></div>
          </div>

          <div class="prompter-controls" id="prompter-controls">

  <script>
    (function() {
      'use strict';

      // ===== UTILITIES =====

      const toast = (msg, dur = 3000) => {
        const el = $('#toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), dur);
      };
      const formatTime = s => {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m > 0 ? `${m}h ${sec}m` : `${sec}m`;
      };
      const formatDuration = s => {
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const sec = String(Math.floor(s % 60)).padStart(2, '0');
        return `${m}:${sec}`;
      };
      const escapeHtml = str => { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; };

      // ===== INDEXEDDB =====
      const DB_NAME = 'PrompticaDB';
      const STORE_NAME = 'scripts';
      let db = null;

      function openDB() {
        return new Promise((res, rej) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id',
                autoIncrement: true });
            if (!db.objectStoreNames.contains('content')) db.createObjectStore('content', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', { keyPath: 'id',
                autoIncrement: true });
          };
          req.onsuccess = () => { db = req.result;
            res(db); };
          req.onerror = () => rej(req.error);
        });
      }

      async function getAllScripts() { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction(STORE_NAME, 'readonly'); const req = tx.objectStore(STORE_NAME).getAll();
          req.onsuccess = () => res(req.result);
          req.onerror = () => rej(req.error); }); }
      async function saveScript(script) { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction(STORE_NAME, 'readwrite'); const req = tx.objectStore(STORE_NAME).put(script);
          req.onsuccess = () => res(req.result);
          req.onerror = () => rej(req.error); }); }
      async function deleteScript(id) { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction(STORE_NAME, 'readwrite'); const req = tx.objectStore(STORE_NAME).delete(id);
          req.onsuccess = () => res();
          req.onerror = () => rej(req.error); }); }
      async function getContent() { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction('content', 'readonly'); const req = tx.objectStore('content').get('main');
          req.onsuccess = () => res(req.result || { id: 'main', articles: [], speakEasy: [], tips: [] });
          req.onerror = () => rej(req.error); }); }
      async function saveContent(content) { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction('content', 'readwrite'); const req = tx.objectStore('content').put({ ...content, id: 'main' });
          req.onsuccess = () => res();
          req.onerror = () => rej(req.error); }); }
      async function saveSession(session) { if (!db) await openDB(); return new Promise((res, rej) => { const tx = db
            .transaction('sessions', 'readwrite'); const req = tx.objectStore('sessions').add(session);
          req.onsuccess = () => res(req.result);
          req.onerror = () => rej(req.error); }); }

        settingSpeed.value = s.speed;

      // ===== SCRIPTS =====
      async function continueLast() {
        const scripts = await getAllScripts();
        if (!scripts.length) { toast('No scripts yet'); return; }
        const last = scripts.sort((a, b) => b.updatedAt - a.updatedAt)[0];
        openScript(last.id);
      }

      async function openScript(id) {
        const scripts = await getAllScripts();
        const script = scripts.find(s => s.id === id);
        if (!script) return toast('Script not found');
        state.currentScriptId = id;
        scriptTitle.value = script.title || 'Untitled';
        scriptText.value = script.content || '';
        if (script.settings) Object.assign(state.settings, script.settings);
        applySettingsToUI(state.settings);
        showPage('editor-page');
        scriptText.focus();
      }

      async function newScript() {
        const data = { title: 'Untitled', content: '', updatedAt: Date.now(), settings: { ...state.settings } };
        const id = await saveScript(data);
        state.currentScriptId = id;
        scriptTitle.value = 'Untitled';
        scriptText.value = '';
        applySettingsToUI(state.settings);
        showPage('editor-page');
        scriptText.focus();
      }

      async function saveCurrentScript() {
        if (!state.currentScriptId) return;
        const data = { id: state.currentScriptId, title: scriptTitle.value.trim() || 'Untitled',
          content: scriptText.value, updatedAt: Date.now(), settings: { ...state.settings } };
        await saveScript(data);
        toast('Saved');
        updateDashboard();

      function importFolder() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt,.md';
        input.multiple = true;
        input.onchange = async (e) => {
          const files = e.target.files;
          for (const file of files) {
            const text = await file.text();
            const data = { title: file.name.replace(/\.[^.]+$/, ''), content: text, updatedAt: Date.now(),
              settings: { ...state.settings } };
            await saveScript(data);
          }
          toast(`Imported ${files.length} scripts`);
          updateDashboard();
        };
        input.click();
      }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `promptica_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('Exported');

          <div style="margin-bottom:16px;border-bottom:1px solid var(--border-color);padding-bottom:12px;">
            <h3>${cat.icon || '🎤'} ${cat.name}</h3>
            <p style="color:var(--text-secondary);font-size:14px;">${cat.description || ''}</p>
            ${cat.articles ? cat.articles.map(a => `<div style="font-size:13px;padding:4px 0;color:var(--text-primary);">• ${a}</div>`).join('') : ''}
          </div>
        `).join('');
        showModal('🎤 SpeakEasy – Public Speaking Coach', `
          <p style="margin-bottom:16px;">Your personal coach to master public speaking. Track your progress and practice with real‑time feedback.</p>
          <div style="background:var(--bg-panel);padding:12px;border-radius:8px;margin-bottom:16px;">
            <strong>🔥 Streak:</strong> ${state.streakData.currentStreak} days &nbsp;|&nbsp; <strong>🎙️ Sessions:</strong> ${state.streakData.totalSessions}
          </div>
          ${html || '<p style="color:var(--text-secondary);">No categories yet. Admin can add them.</p>'}
          <button class="btn btn-primary" onclick="document.getElementById('modal-close').click()">Close</button>
          <button class="btn" id="start-coach-session" style="margin-left:8px;">Start Practice</button>
        `);
        document.getElementById('start-coach-session')?.addEventListener('click', () => {
          modalOverlay.classList.remove('active');
          enterPrompter(true);
        });
      }

      // ===== CALIBRATION =====
      function startCalibration() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          toast('Speech recognition not supported');
          return;
        }
        toast('Calibration: read the sample text aloud');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.interimResults = false;
        const sample =
          "The quick brown fox jumps over the lazy dog. This is a sample text to measure your reading pace. Please read it naturally.";
        const words = sample.split(/\s+/).length;
        let startTime = 0;
        rec.onstart = () => { startTime = Date.now();
          toast('Listening...'); };
        rec.onresult = (e) => {
          const spoken = e.results[0][0].transcript.trim();
          const elapsed = (Date.now() - startTime) / 1000;
          const spokenWords = spoken.split(/\s+/).length;
          const wpm = Math.round((spokenWords / elapsed) * 60);
          const speed = Math.min(10, Math.max(1, Math.round(wpm / 30)));
          setSpeed(speed);
          toast(`Calibrated! Speed set to ${speed} (${wpm} WPM)`);
          rec.stop();
        };
        rec.onerror = () => toast('Calibration failed, try again');
        rec.start();
      }

      // ===== SPEED =====
      function setSpeed(val) {
        val = Math.min(10, Math.max(1, val));
        state.settings.speed = val;
        settingSpeed.value = val;
        speedLabel.textContent = val;
        ctrlSpeed.value = val;
        ctrlSpeedLabel.textContent = val;
        autoSaveScript();
      }

      // ===== PROMPTER =====
      function renderPrompterText() {
        const text = scriptText.value || '— No script loaded —';
        const lines = text.split('\n');
        prompterText.innerHTML = lines.map(l => l.trim() ? `<p>${escapeHtml(l)}</p>` : '<p>&nbsp;</p>').join('');
      }

      function applyPrompterStyles() {
        const s = state.settings;
        let bg = s.bgColor;
        if (bg.startsWith('#')) {
          const r = parseInt(bg.slice(1, 3), 16),
            g = parseInt(bg.slice(3, 5), 16),
            b = parseInt(bg.slice(5, 7), 16);
          bg = `rgba(${r},${g},${b},${s.bgOpacity})`;
        }
        prompterViewport.style.setProperty('--prompter-bg', bg);
        prompterText.style.color = s.textColor;
        prompterText.style.fontFamily = s.fontFamily;
        prompterText.style.fontSize = s.fontSize + 'px';
        prompterTextWrap.classList.toggle('mirror', s.mirror);
        prompterViewport.classList.toggle('no-focus', !s.focus);
        ctrlMirror.classList.toggle('active', s.mirror);
        ctrlFocus.classList.toggle('active', s.focus);
      }

      function resetScroll() { state.scrollProgress = 0;
        updateTextPosition();
        progressFill.style.width = '0%'; }

      function measureTextHeight() {
        const wrap = prompterTextWrap;
        const cur = wrap.style.transform;
        wrap.style.transform = 'none';
        state.textHeight = prompterText.scrollHeight;
        const vp = prompterViewport.getBoundingClientRect();
        state.viewportHeight = vp.height;
        state.maxScrollPx = Math.max(0, state.textHeight - state.viewportHeight);
        wrap.style.transform = cur || 'translateY(0px)';
        if (state.maxScrollPx <= 0) { state.isPlaying = false;
          updatePlayIcon(); }
      }

      function updateTextPosition() {
        const wrap = prompterTextWrap;
        const progress = state.scrollProgress;
        const total = state.viewportHeight + state.textHeight;
        let y = state.viewportHeight - progress * total;
        y = Math.max(-state.textHeight, Math.min(state.viewportHeight, y));
        const mirror = state.settings.mirror;
        wrap.style.transform = mirror ? `scaleX(-1) translateY(${y}px)` : `translateY(${y}px)`;
        progressFill.style.width = Math.min(100, progress * 100) + '%';
      }

      function animateScroll(ts) {
        if (!prompterPage.classList.contains('active')) return;
        const delta = state.lastTimestamp ? (ts - state.lastTimestamp) / 1000 : 0;
        state.lastTimestamp = ts;
        if (state.isPlaying && state.maxScrollPx > 0) {
          const spd = state.settings.speed / 10;
          const pxPerSec = 300 * spd * 1.6;
          const total = state.viewportHeight + state.textHeight;
          const dP = (pxPerSec * delta) / total;
          state.scrollProgress = Math.min(1, state.scrollProgress + dP);
          updateTextPosition();
          if (state.scrollProgress >= 1) { state.isPlaying = false;
            updatePlayIcon(); }
        }
        state.animFrameId = requestAnimationFrame(animateScroll);
      }

      function startAnimation() { if (state.animFrameId) cancelAnimationFrame(state.animFrameId);
        state.lastTimestamp = 0;
        state.animFrameId = requestAnimationFrame(animateScroll); }

      function stopAnimation() { if (state.animFrameId) { cancelAnimationFrame(state.animFrameId);
          state.animFrameId = null; } }

      function togglePlay() {
        if (state.maxScrollPx <= 0) { state.isPlaying = false;
          updatePlayIcon(); return; }
        if (state.scrollProgress >= 1) { state.scrollProgress = 0;
          updateTextPosition();
          progressFill.style.width = '0%'; }
        state.isPlaying = !state.isPlaying;
        updatePlayIcon();
      }

      function updatePlayIcon() { ctrlPlayIcon.textContent = state.isPlaying ? '⏸' : '▶'; }

      // ===== CAMERA =====
      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
            audio: true
          });
          state.cameraStream = stream;
          camBgVideo.srcObject = stream;
          camCompactVideo.srcObject = stream;
          await camBgVideo.play();
          await camCompactVideo.play();
          return stream;
        } catch (e) { toast('Camera error: ' + e.message); return null; }
      }

      function toggleCameraMode() {
        if (state.camMode === 'full') {
          state.camMode = 'compact';
          camBg.style.display = 'none';
          camCompact.style.display = 'block';
          camToggle.textContent = '📷 Full';
          camCompact.style.left = state.camCompactPos.x + 'px';
          camCompact.style.top = state.camCompactPos.y + 'px';
          camCompact.style.width = state.camCompactPos.w + 'px';
          camCompact.style.height = state.camCompactPos.h + 'px';
        } else {
          state.camMode = 'full';
          camCompact.style.display = 'none';
          camBg.style.display = 'block';
          camToggle.textContent = '📷 Compact';
        }
        localStorage.setItem('prompter_cam_mode', state.camMode);
      }

      // ===== DRAGGABLE CAMERA =====
      let dragData = null;

      function initDraggable() {
        const el = camCompact;
        el.addEventListener('pointerdown', (e) => {
          if (e.target === resizeHandle) return;
          const rect = el.getBoundingClientRect();
          dragData = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
          el.style.cursor = 'grabbing';
          document.addEventListener('pointermove', onDrag);
          document.addEventListener('pointerup', stopDrag);
          e.preventDefault();
        });
        resizeHandle.addEventListener('pointerdown', (e) => {
          dragData = { resize: true, startX: e.clientX, startY: e.clientY, startW: el.offsetWidth,
            startH: el.offsetHeight };
          document.addEventListener('pointermove', onResize);
          document.addEventListener('pointerup', stopResize);
          e.preventDefault();
        });
      }

      function onDrag(e) {
        if (!dragData) return;
        const rect = prompterViewport.getBoundingClientRect();
        let x = e.clientX - rect.left - dragData.offsetX;
        let y = e.clientY - rect.top - dragData.offsetY;
        x = Math.max(0, Math.min(rect.width - camCompact.offsetWidth, x));
        y = Math.max(0, Math.min(rect.height - camCompact.offsetHeight, y));
        camCompact.style.left = x + 'px';
        camCompact.style.top = y + 'px';
        state.camCompactPos.x = x;
        state.camCompactPos.y = y;
      }

      function stopDrag() { document.removeEventListener('pointermove', onDrag);
        document.removeEventListener('pointerup', stopDrag); if (camCompact) camCompact.style.cursor = 'grab';
        dragData = null; }

      function onResize(e) {
        if (!dragData) return;
        let w = dragData.startW + (e.clientX - dragData.startX);
        let h = dragData.startH + (e.clientY - dragData.startY);
        w = Math.max(80, Math.min(400, w));
        h = Math.max(60, Math.min(300, h));
        camCompact.style.width = w + 'px';
        camCompact.style.height = h + 'px';
        state.camCompactPos.w = w;
        state.camCompactPos.h = h;
      }

      function stopResize() { document.removeEventListener('pointermove', onResize);
        document.removeEventListener('pointerup', stopResize);
        dragData = null; }

      // ===== RECORDING (with preview) =====
      function startRawRecording() {
        if (state.isRecording) return;
        if (!state.cameraStream) { toast('Camera not ready'); return; }
        const stream = new MediaStream();
        const videoTracks = state.cameraStream.getVideoTracks();
        const audioTracks = state.cameraStream.getAudioTracks();
        if (videoTracks.length) stream.addTrack(videoTracks[0].clone());
        if (audioTracks.length) stream.addTrack(audioTracks[0].clone());
        state.mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        state.recordedChunks = [];
        state.mediaRecorder.ondataavailable = (e) => { if (e.data.size) state.recordedChunks.push(e.data); };
        state.mediaRecorder.onstop = () => {
          const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
          state.recordedChunks = [];
          state.isRecording = false;
          recordingDot.classList.remove('recording');
          clearInterval(state.recordTimerInterval);
          recordTimer.textContent = '00:00';
          showVideoPreview(blob);
          const duration = (Date.now() - state.recordStartTime) / 1000;
          saveSession({ timestamp: Date.now(), duration, confidence: state.confidence, filler: state.fillerCount });
          updateStreak('record');
          toast('Recording ready – preview below');
        };
        state.isRecording = true;
        recordingDot.classList.add('recording');
        state.recordStartTime = Date.now();
        state.recordTimerInterval = setInterval(() => {
          const el = (Date.now() - state.recordStartTime) / 1000;
          recordTimer.textContent = formatDuration(el);
        }, 200);
        state.mediaRecorder.start(1000);
        toast('Recording started (raw video+audio)');
      }

      function showVideoPreview(blob) {
        const url = URL.createObjectURL(blob);
        const html = `
          <p style="margin-bottom:12px;">Review your recording below. Click “Save Video” to download, or close to discard.</p>
          <video src="${url}" controls autoplay></video>
          <div style="display:flex;gap:12px;margin-top:16px;">
            <button class="btn btn-primary" id="save-video-btn">💾 Save Video</button>
            <button class="btn" id="discard-video-btn">🗑 Discard</button>
          </div>
        `;
        showModal('🎥 Recording Preview', html);
        document.getElementById('save-video-btn').addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = `promptica_recording_${Date.now()}.webm`;
          a.click();
          URL.revokeObjectURL(url);
          modalOverlay.classList.remove('active');
          toast('Video saved');
        });
        document.getElementById('discard-video-btn').addEventListener('click', () => {
          URL.revokeObjectURL(url);
          modalOverlay.classList.remove('active');
          toast('Discarded');
        });
        const closeHandler = () => { URL.revokeObjectURL(url);
          modalOverlay.removeEventListener('click', closeHandler); };
        modalOverlay.addEventListener('click', closeHandler);
      }

      function stopRawRecording() {
        if (state.mediaRecorder && state.isRecording) {
          state.mediaRecorder.stop();
          state.isRecording = false;
          recordingDot.classList.remove('recording');
          clearInterval(state.recordTimerInterval);
        }
      }

      function toggleRecording() {
        state.isRecording ? stopRawRecording() : startRawRecording();
      }

      // ===== STREAK =====
      function updateStreak(type) {
        const today = new Date().toISOString().split('T')[0];
        if (type === 'practice') {
          if (state.streakData.lastPracticeDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().split('T')[0];
            if (state.streakData.lastPracticeDate === yStr) state.streakData.currentStreak++;
            else state.streakData.currentStreak = 1;
            state.streakData.lastPracticeDate = today;
            if (state.streakData.currentStreak > state.streakData.longestStreak) state.streakData.longestStreak = state
              .streakData.currentStreak;
          }
        } else if (type === 'record') {
          if (state.streakData.lastRecordingDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toISOString().split('T')[0];
            if (state.streakData.lastRecordingDate === yStr) state.streakData.recordingStreak++;
            else state.streakData.recordingStreak = 1;
            state.streakData.lastRecordingDate = today;
            if (state.streakData.recordingStreak > state.streakData.longestRecordingStreak) state.streakData
              .longestRecordingStreak = state.streakData.recordingStreak;
          }
        }
        state.streakData.totalSessions++;
        localStorage.setItem('promptica_streak', JSON.stringify(state.streakData));
        updateDashboard();
      }

      // ===== COACH =====
      let coachInterval = null;
      let speechRec = null;

      function startCoach() {
        state.coachActive = true;
        coachIndicators.style.display = 'block';
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
          speechRec = new SpeechRec();
          speechRec.lang = 'en-US';
          speechRec.interimResults = true;
          speechRec.continuous = true;
          speechRec.onresult = (e) => {
            for (const res of e.results) {
              const transcript = res[0].transcript.toLowerCase();
              const fillers = ['um', 'uh', 'like', 'you know', 'actually', 'basically'];
              const words = transcript.split(/\s+/);
              for (const w of words)
                if (fillers.includes(w)) state.fillerCount++;
              fillerCount.textContent = state.fillerCount;
            }
          };
          speechRec.start();
        }
        if (!state.analyser) initVAD();
        if (coachInterval) clearInterval(coachInterval);
        coachInterval = setInterval(() => {
          if (!state.coachActive) return;
          const spd = state.settings.speed;
          if (spd > 7) { speedLight.className = 'light fast';
            speedLabelCoach.textContent = 'Fast'; } else if (spd < 3) { speedLight.className = 'light slow';
            speedLabelCoach.textContent = 'Slow'; } else { speedLight.className = 'light';
            speedLabelCoach.textContent = 'Pace'; }
          const fillerPenalty = Math.min(20, state.fillerCount * 2);
          const speedDev = Math.abs(spd - 5) * 2;
          let conf = 100 - fillerPenalty - speedDev;
          conf = Math.max(0, Math.min(100, conf));
          state.confidence = conf;
          confidenceScore.textContent = `Confidence: ${conf}%`;
          breathCircle.style.display = state.vadSpeaking ? 'none' : 'block';
        }, 1000);
      }

      function stopCoach() {
        state.coachActive = false;
        coachIndicators.style.display = 'none';
        if (speechRec) { speechRec.stop();
          speechRec = null; }
        if (coachInterval) { clearInterval(coachInterval);
          coachInterval = null; }
        state.fillerCount = 0;
        fillerCount.textContent = '0';
      }

      // ===== VAD =====
      let vadInitialized = false;

      async function initVAD() {
        if (vadInitialized) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          state.audioContext = audioCtx;
          state.analyser = analyser;
          vadInitialized = true;
          monitorVAD();
        } catch (e) { toast('Microphone error: ' + e.message); }
      }

      function monitorVAD() {
        if (!state.analyser) return;
        const data = new Uint8Array(state.analyser.fftSize);
        state.analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        const avg = sum / data.length / 255;
        if (avg > state.vadThreshold && !state.vadSpeaking) {
          state.vadSpeaking = true;
          if (!state.isPlaying && state.maxScrollPx > 0) {
            if (state.scrollProgress >= 1) { state.scrollProgress = 0;
              updateTextPosition();
              progressFill.style.width = '0%'; }
            state.isPlaying = true;
            updatePlayIcon();
          }
        } else if (avg < state.vadThreshold && state.vadSpeaking) {
          state.vadSpeaking = false;
          clearTimeout(state.vadHoldTimer);
          state.vadHoldTimer = setTimeout(() => {
            if (!state.vadSpeaking) { state.isPlaying = false;
              updatePlayIcon(); }
          }, 300);
        }
        if (state.vadEnabled) requestAnimationFrame(monitorVAD);
      }

      // ===== ENTER / EXIT PROMPTER =====
      async function enterPrompter(withCoach = false) {
        await saveCurrentScript();
        renderPrompterText();
        showPage('prompter-page');
        applyPrompterStyles();
        if (!state.cameraStream) await initCamera();
        const savedMode = localStorage.getItem('prompter_cam_mode') || 'full';
        state.camMode = savedMode;
        if (savedMode === 'full') { camBg.style.display = 'block';
          camCompact.style.display = 'none';
          camToggle.textContent = '📷 Compact'; } else { camBg.style.display = 'none';
          camCompact.style.display = 'block';
          camToggle.textContent = '📷 Full'; }
        camCompact.style.left = state.camCompactPos.x + 'px';
        camCompact.style.top = state.camCompactPos.y + 'px';
        camCompact.style.width = state.camCompactPos.w + 'px';
        camCompact.style.height = state.camCompactPos.h + 'px';

        if (withCoach) startCoach();
        updateStreak('practice');

        requestAnimationFrame(() => {
          setTimeout(() => {
            measureTextHeight();
            resetScroll();
            if (state.maxScrollPx > 0) { state.isPlaying = true;
              updatePlayIcon(); } else { state.isPlaying = false;
              updatePlayIcon(); }
            startAnimation();
            showControlsTemporarily();
            if (prompterPage.requestFullscreen) prompterPage.requestFullscreen().catch(() => {});
          }, 50);
        });
      }

      function exitPrompter() {
        stopRawRecording();
        stopCoach();
        state.isPlaying = false;
        stopAnimation();
        if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
        prompterPage.classList.remove('active');
        showPage('home-page');
        updateDashboard();
      }

      // ===== CONTROLS AUTO-HIDE =====
      let controlsTimeout = null;

      function showControlsTemporarily() {
        prompterControls.classList.add('visible');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => prompterControls.classList.remove('visible'), 3500);
      }

      // ===== KEYBOARD SHORTCUTS =====
      document.addEventListener('keydown', (e) => {
        if (prompterPage.classList.contains('active')) {
          if (e.key === ' ' || e.key === 'Space') { e.preventDefault();
            togglePlay();
            showControlsTemporarily(); return; }
          if (e.key === 'Escape') { e.preventDefault();
            exitPrompter(); return; }
          if (e.key === 'ArrowUp') { e.preventDefault();
            setSpeed(Math.min(10, state.settings.speed + 0.5));
            showControlsTemporarily(); return; }
          if (e.key === 'ArrowDown') { e.preventDefault();
            setSpeed(Math.max(1, state.settings.speed - 0.5));
            showControlsTemporarily(); return; }
          if (e.key === 'm' || e.key === 'M') { e.preventDefault();
            toggleMirrorMode();
            showControlsTemporarily(); return; }
          if (e.key === 'f' || e.key === 'F') { e.preventDefault();
            toggleFocusMode();
            showControlsTemporarily(); return; }
          if (e.key === 'r' || e.key === 'R') { e.preventDefault();
            toggleRecording();
            showControlsTemporarily(); return; }
          if (e.key === 'c' || e.key === 'C') { e.preventDefault();
            toggleCoach();
            showControlsTemporarily(); return; }
        }
        if (editorPage.classList.contains('active') && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          enterPrompter();
        }
      });

      // ===== TOGGLES =====
      function toggleMirrorMode() { state.settings.mirror = !state.settings.mirror;
        toggleMirror.classList.toggle('active', state.settings.mirror); if (prompterPage.classList.contains('active'))
          applyPrompterStyles();
        autoSaveScript(); }

      function toggleFocusMode() { state.settings.focus = !state.settings.focus;
        toggleFocus.classList.toggle('active', state.settings.focus); if (prompterPage.classList.contains('active'))
          applyPrompterStyles();
        autoSaveScript(); }

      function toggleCoach() {
        if (prompterPage.classList.contains('active')) {
          if (state.coachActive) stopCoach();
          else startCoach();
        } else toast('Enter prompter first');
      }

      // ===== EVENT BINDINGS =====
      editorBack.addEventListener('click', async () => { await saveCurrentScript();
        showPage('home-page');
        updateDashboard(); });
      scriptTitle.addEventListener('input', autoSaveScript);
      scriptText.addEventListener('input', autoSaveScript);
      btnSave.addEventListener('click', saveCurrentScript);
      btnEnter.addEventListener('click', () => enterPrompter(false));

      settingSpeed.addEventListener('input', () => { setSpeed(parseFloat(settingSpeed.value));
        autoSaveScript(); });
      settingFont.addEventListener('change', () => { state.settings.fontFamily = settingFont.value; if (prompterPage
          .classList.contains('active')) applyPrompterStyles();
        autoSaveScript(); });
      settingSize.addEventListener('change', () => { state.settings.fontSize = parseInt(settingSize.value); if (prompterPage
          .classList.contains('active')) { applyPrompterStyles();
          requestAnimationFrame(() => { setTimeout(() => { measureTextHeight();
              updateTextPosition(); }, 30); }); }
        autoSaveScript(); });
      settingTextColor.addEventListener('input', () => { state.settings.textColor = settingTextColor.value; if (prompterPage
          .classList.contains('active')) applyPrompterStyles();
        autoSaveScript(); });
      settingBgColor.addEventListener('input', () => { state.settings.bgColor = settingBgColor.value; if (prompterPage
          .classList.contains('active')) applyPrompterStyles();
        autoSaveScript(); });
      settingBgOpacity.addEventListener('input', () => { const v = parseFloat(settingBgOpacity.value);
        state.settings.bgOpacity = v;
        opacityLabel.textContent = v.toFixed(2); if (prompterPage.classList.contains('active')) applyPrompterStyles();
        autoSaveScript(); });
      toggleMirror.addEventListener('click', toggleMirrorMode);
      toggleFocus.addEventListener('click', toggleFocusMode);
      toggleVad.addEventListener('click', () => {
        state.settings.vad = !state.settings.vad;
        toggleVad.classList.toggle('active', state.settings.vad);
        state.vadEnabled = state.settings.vad;
        if (state.vadEnabled) { if (!vadInitialized) initVAD();
          else monitorVAD(); } else { state.vadSpeaking = false;
          clearTimeout(state.vadHoldTimer);
          state.isPlaying = false;
          updatePlayIcon(); }
        autoSaveScript();
      });
      btnCalibrate.addEventListener('click', startCalibration);

      ctrlPlay.addEventListener('click', () => { togglePlay();
        showControlsTemporarily(); });
      ctrlSpeed.addEventListener('input', () => { setSpeed(parseFloat(ctrlSpeed.value));
        showControlsTemporarily(); });
      ctrlMirror.addEventListener('click', () => { toggleMirrorMode();
        showControlsTemporarily(); });
      ctrlFocus.addEventListener('click', () => { toggleFocusMode();
        showControlsTemporarily(); });
      ctrlRecord.addEventListener('click', () => { toggleRecording();
        showControlsTemporarily(); });
      ctrlCoach.addEventListener('click', () => { toggleCoach();
        showControlsTemporarily(); });
      ctrlExit.addEventListener('click', exitPrompter);
      prompterBack.addEventListener('click', exitPrompter);

      camToggle.addEventListener('click', toggleCameraMode);
      initDraggable();

      prompterPage.addEventListener('mousemove', () => { if (prompterPage.classList.contains('active'))
        showControlsTemporarily(); });
      prompterPage.addEventListener('touchstart', () => { if (prompterPage.classList.contains('active'))
        showControlsTemporarily(); });
      window.addEventListener('resize', () => {
        if (prompterPage.classList.contains('active')) {
          requestAnimationFrame(() => { setTimeout(() => { measureTextHeight();
              updateTextPosition(); }, 50); });
        }
      });
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && prompterPage.classList.contains('active')) showControlsTemporarily();
      });

      // ===== HERO START BUTTON =====
      heroStart.addEventListener('click', () => {
        newScript();
        setTimeout(() => enterPrompter(false), 200);
      });

      tipMore.addEventListener('click', () => {
        showModal('💡 All Tips', `
          <ul style="color:var(--text-secondary);font-size:14px;line-height:1.8;">
            ${state.tips.map(t => `<li>${t}</li>`).join('')}
          </ul>
          <button class="btn btn-primary" onclick="document.getElementById('modal-close').click()">Close</button>
        `);
      });

      // ===== ADMIN (simple, no panel, just content sync) =====
      // We'll keep it lightweight – admin can manage content via the existing getContent/saveContent.
      // For full admin panel, we can add later.

      // ===== INIT =====
      async function init() {
        await openDB();
        // Load settings
        try {
          const saved = localStorage.getItem('prompter_global_settings');
          if (saved) { const p = JSON.parse(saved);
            Object.assign(state.settings, p);
            applySettingsToUI(state.settings); }
        } catch (_) {}
        // Load streak
        try {
          const s = localStorage.getItem('prompter_streak');
          if (s) { state.streakData = JSON.parse(s); }
        } catch (_) {}
        // Load cam mode
        const mode = localStorage.getItem('prompter_cam_mode');
        if (mode) state.camMode = mode;
        // Load theme
        try {
          const t = localStorage.getItem('promptica_theme');
          if (t) { const p = JSON.parse(t);
            document.documentElement.style.setProperty('--bg-primary', p.bg);
            document.documentElement.style.setProperty('--text-primary', p.text); }
        } catch (_) {}

        renderQuickGrid();
        updateDashboard();
        initCamera();
        initVAD();
        document.addEventListener('change', readSettingsFromUI);
        toast('🎙️ Promptica ready');
        window.__prompter = { state, enterPrompter, exitPrompter, togglePlay, setSpeed, toggleRecording, toggleCoach,
          startCalibration };
      }

      init();
    })();
  </script>
</body>
</html>
